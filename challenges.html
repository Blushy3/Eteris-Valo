}.result-choice b{display:block;font-family:var(--font-head);font-size:27px;text-transform:uppercase}.upload-box{position:relative;display:grid;place-items:center;min-height:210px;border:1px dashed rgba(255,255,255,.2);border-radius:14px;background:rgba(255,255,255,.025);text-align:center;padding:18px;overflow:hidden}.upload-box img{max-width:100%;max-height:250px;object-fit:contain;border-radius:10px}.upload-title{font-family:var(--font-head);font-size:30px;font-weight:800;text-transform:uppercase;color:#fff}.upload-copy{margin-top:5px;color:var(--muted);font-size:14px;line-height:1.5}.detected-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.detected-stat{border:1px solid var(--border);border-radius:9px;background:rgba(255,255,255,.03);padding:8px}.detected-stat span{display:block;font:9px var(--font-mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted)}.detected-input{display:block;width:100%;margin-top:3px;border:0;background:transparent;color:#fff;font-family:var(--font-head);font-size:22px;font-weight:800;line-height:1;outline:none}.detected-input::-webkit-outer-spin-button,.detected-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.detected-input[type=number]{appearance:textfield}.detect-note{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.4}.confirm-box{border:1px solid rgba(255,70,85,.24);border-radius:14px;background:linear-gradient(135deg,rgba(255,70,85,.12),rgba(255,255,255,.03));padding:16px;margin-top:12px}.confirm-box b{display:block;font-family:var(--font-head);font-size:26px;text-transform:uppercase;color:#fff;margin-bottom:6px}.confirm-box p{color:var(--muted);font-size:15px;line-height:1.45}.sr-result{text-align:center;padding:28px 20px 24px;overflow:hidden}.sr-orb{position:relative;width:142px;height:142px;margin:4px auto 16px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,rgba(255,255,255,.12),rgba(255,70,85,.08) 58%,transparent 60%);border:1px solid rgba(255,255,255,.1);box-shadow:0 0 56px rgba(255,70,85,.22)}.sr-orb::before{content:'';position:absolute;inset:-8px;border-radius:inherit;border:1px solid rgba(255,70,85,.28);animation:srPulse 1.8s ease-out infinite}.sr-orb.good{box-shadow:0 0 62px rgba(16,185,129,.25)}.sr-orb.good::before{border-color:rgba(16,185,129,.35)}.sr-delta{font-family:var(--font-head);font-size:58px;font-weight:800;color:#fff;line-height:1}.sr-delta.good{color:var(--green)}.sr-delta.bad{color:var(--red)}.sr-result-title{font-family:var(--font-head);font-size:34px;font-weight:800;text-transform:uppercase;color:#fff}.sr-result-copy{max-width:460px;margin:8px auto 0;color:var(--muted);font-size:16px;line-height:1.45}.sr-flow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:18px auto 0;max-width:430px}.sr-flow-box{border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(255,255,255,.035)}.sr-flow-box span{display:block;font:9px var(--font-mono);letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.sr-flow-box b{font-family:var(--font-head);font-size:28px;color:#fff}.sr-arrow{font-family:var(--font-mono);color:var(--muted)}.modal-actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:16px}.note{color:var(--muted);font-size:14px;line-height:1.5;min-height:42px;white-space:pre-wrap}.toast{position:fixed;left:50%;bottom:28px;z-index:90;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:rgba(12,12,18,.96);border:1px solid var(--border-hv);border-radius:999px;padding:11px 18px;font-size:14px;font-weight:700;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%)}@keyframes srPulse{0%{transform:scale(.92);opacity:.9}100%{transform:scale(1.25);opacity:0}}@media(max-width:980px){.leader-head{align-items:start;flex-direction:column}.summary{grid-template-columns:1fr 1fr}.head{align-items:start;flex-direction:column}.nav-links{display:none}.detected-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.summary,.grid,.rank-row,.result-row{grid-template-columns:1fr}.leader-row{grid-template-columns:28px auto 1fr}.leader-sr{grid-column:3/5}.arrow{display:none}.modal-title{font-size:32px}.player-top{align-items:flex-start}.card-action{width:100%;margin-left:0}.card-action .btn{width:100%;text-align:center}.sr-flow{grid-template-columns:1fr}.sr-arrow{display:none}}

<main class="page">
  <div class="head">
    <div><div class="eyebrow">Act goals</div><h1 class="title">Challenges</h1><p class="sub">Individual rank targets for the current act. Track who completed the goal and who still needs progress.</p></div>

<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getS=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setS=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
const ranks=['Unranked','Iron 1','Iron 2','Iron 3','Bronze 1','Bronze 2','Bronze 3','Silver 1','Silver 2','Silver 3','Gold 1','Gold 2','Gold 3','Platinum 1','Platinum 2','Platinum 3','Diamond 1','Diamond 2','Diamond 3','Ascendant 1','Ascendant 2','Ascendant 3','Immortal 1','Immortal 2','Immortal 3','Radiant'];
const ETERIS_PLAYER_SR=10000;
let me=getS(),accounts=[],players=[],challenges=[],skillRatings=[],skillReports=[],skillResult='win',matchImageFile=null,detectedStats=null,ocrText='',submitAccountId=null,pendingSubmitStats=null;
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}
function rankIndex(rank){const i=ranks.indexOf(rank);return i<0?0:i}
function rankOptions(selected){return ranks.map(r=>`<option ${r===selected?'selected':''}>${r}</option>`).join('')}
function gap(current,target){return Math.max(0,rankIndex(target)-rankIndex(current))}
function progress(current,target){const t=rankIndex(target);if(t<=0)return 100;return Math.min(100,Math.round((rankIndex(current)/t)*100))}
function state(row){return gap(row.current_rank,row.target_rank)===0?'complete':'fail'}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function skillInfo(rating){const points=Math.max(0,Number(rating)||0);const player=points>=ETERIS_PLAYER_SR;return{rank:player?'Eteris Player':'',rating:points,next:player?null:ETERIS_PLAYER_SR,progress:player?100:Math.round((points/ETERIS_PLAYER_SR)*100),isPlayer:player}}
function calcDelta(data){const acs=Number(data.acs)||0,kills=Number(data.kills)||0,deaths=Math.max(1,Number(data.deaths)||0),assists=Number(data.assists)||0,plus=Number(data.plus_minus)||kills-deaths,kd=Number(data.kd_ratio)||kills/deaths,dd=Number(data.damage_delta)||0,adr=Number(data.adr)||0,hs=Number(data.hs_percent)||0,kast=Number(data.kast_percent)||0,fk=Number(data.first_kills)||0,fd=Number(data.first_deaths)||0,mk=Number(data.multi_kills)||0;const perf=Math.round(clamp((acs-190)/16,-12,16)+clamp((adr-130)/10,-10,12)+clamp(dd/8,-12,12)+clamp((kast-70)/4,-8,10)+clamp((kd-1)*10,-10,12)+clamp(plus/2,-9,10)+clamp(hs-22,-5,8)*.25+(fk*2)-(fd*2)+(mk*1.5)+(assists*.35));return data.result==='win'?clamp(20+perf,2,55):clamp(-18+Math.round(perf*.65),-45,-2)}
function displayName(a,p){return a?.display_name||p?.username||a?.username||'Player'}
function avatar(a,name){return a?.avatar_url?`<img src="${esc(a.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase())}
function rows(){return players.map(p=>{const account=accounts.find(a=>a.player_id===p.id)||accounts.find(a=>a.username?.toLowerCase()===p.username?.toLowerCase());if(!account)return null;const ch=challenges.find(c=>c.account_id===account.id)||{};const sr=skillRatings.find(s=>s.account_id===account.id)||{rating:0,verification_required:true};const pending=skillReports.filter(x=>x.account_id===account.id).length;return{player:p,account,act_label:ch.act_label||'Current Act',target_rank:ch.target_rank||'Gold 1',current_rank:ch.current_rank||'Unranked',hours_played:Number(ch.hours_played||0),admin_note:ch.admin_note||'',skill:sr,pending}}).filter(Boolean)}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" type="button" onclick="openLogin()">Login</button>';return}const name=me.display_name||me.username;const av=me.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase());const edit=me.is_admin?`<a class="login-btn" href="edit.html">Edit</a>`:'';area.innerHTML=`<a class="nav-user-pill" href="account.html"><div class="nav-user-av">${av}</div><span class="nav-user-name">${esc(name)}</span></a>${edit}<button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){EterisAuth.open({copy:'Enter your private access code to manage challenges.',onLogin:async user=>{me=user;setS(user);await load();toast('Logged in')}})}
function logout(){me=null;setS(null);document.body.classList.remove('admin-on');renderNav();render()}
function renderFilters(){$('#filters').innerHTML=`<a class="btn" href="skill-rating.html">Skill rating info</a><button class="btn btn-red" type="button" onclick="openOwnSkillSubmit()">Submit match</button>`}
function renderSummary(rs){const completed=rs.filter(r=>state(r)==='complete').length;const failed=rs.length-completed;$('#summary').innerHTML=`<div class="sum complete"><div class="sum-k">Completed</div><div class="sum-v">${completed}</div></div><div class="sum fail"><div class="sum-k">Not completed</div><div class="sum-v">${failed}</div></div>`}
function renderLeaderboard(rs){const ordered=[...rs].sort((a,b)=>Number(b.skill?.rating||0)-Number(a.skill?.rating||0));$('#leaderboard').innerHTML=`<div class="leader-head"><div><div class="eyebrow">Skill rating</div><div class="leader-title">SR Leaderboard</div><div class="leader-sub">First target: 10 000 SR. Eteris Player keeps gaining SR after the title.</div></div><a class="btn" href="skill-rating.html">How SR works</a></div><div class="leader-list">${ordered.map((r,i)=>{const name=displayName(r.account,r.player);const skill=skillInfo(r.skill?.rating||0);return`<div class="leader-row"><div class="leader-pos">${i+1}</div><div class="av">${avatar(r.account,name)}</div><div><div class="name">${esc(name)}</div>${skill.isPlayer?'<span class="eteris-badge">Eteris Player</span>':'<div class="skill-rating">Chasing Eteris Player</div>'}</div><div class="leader-sr">${skill.rating} SR</div></div>`}).join('')||'<div class="note">No SR data yet.</div>'}</div>`}
function renderCard(r){const name=displayName(r.account,r.player);const st=state(r);const p=progress(r.current_rank,r.target_rank);const skill=skillInfo(r.skill?.rating||0);return `<article class="card ${st}"><div class="player-top"><div class="player-main"><div class="av">${avatar(r.account,name)}</div><div><div class="name">${esc(name)}</div><div class="state ${st}">${st==='complete'?'Completed':'Not completed'} - ${esc(r.act_label)}</div></div></div></div><div class="rank-row"><div class="rank-box"><div class="rank-label">Current</div><div class="rank-val">${esc(r.current_rank)}</div></div><div class="arrow">-></div><div class="rank-box"><div class="rank-label">Target</div><div class="rank-val">${esc(r.target_rank)}</div></div></div><div class="bar" style="--p:${p}%"><div class="fill"></div></div><div class="note">${esc(r.admin_note||'No admin note yet.')}</div><div class="skill-box"><div><div class="rank-label">Skill rating</div>${skill.rank?`<div class="skill-rank">${esc(skill.rank)}</div>`:''}<div class="skill-rating">${skill.rating} SR</div><div class="sr-track" style="--srp:${skill.progress}%"><span></span></div>${skill.isPlayer?'<span class="eteris-badge">Eteris Player</span>':''}${r.pending?`<span class="pending-pill">${r.pending} pending review</span>`:''}</div></div></article>`}
function render(){document.body.classList.remove('admin-on');renderNav();renderFilters();const rs=rows().sort((a,b)=>state(a)==='complete'&&state(b)!=='complete'?-1:state(a)!=='complete'&&state(b)==='complete'?1:0);renderSummary(rs);renderLeaderboard(rs);$('#grid').innerHTML=rs.length?rs.map(renderCard).join(''):'<div class="card"><div class="note">No players yet.</div></div>'}
function openOwnSkillSubmit(){if(!me){openLogin();return}openSkillSubmit(me.id)}
function closeSkillModal(){submitAccountId=null;pendingSubmitStats=null;matchImageFile=null;detectedStats=null;ocrText='';$('#skill-modal').classList.remove('on');$('#skill-modal').innerHTML=''}
function openSkillSubmit(accountId){if(!me){openLogin();return}submitAccountId=accountId;pendingSubmitStats=null;skillResult='win';matchImageFile=null;detectedStats=null;ocrText='';renderSkillResultStep(accountId);$('#skill-modal').classList.add('on')}
function renderSkillResultStep(accountId){$('#skill-modal').innerHTML=`<div class="modal"><div class="modal-head"><div><div class="eyebrow">Match report</div><div class="modal-title">Submit match</div></div><button class="btn" onclick="closeSkillModal()">Close</button></div><div class="modal-body"><div class="result-row"><button class="result-choice ${skillResult==='win'?'on':''}" id="choice-win" onclick="setSkillResult('win')" type="button"><b>Win</b><span class="note">Match result gives the SR calculation a positive base.</span></button><button class="result-choice ${skillResult==='loss'?'on':''}" id="choice-loss" onclick="setSkillResult('loss')" type="button"><b>Loss</b><span class="note">Loss gives a negative base, but good stats soften it.</span></button></div><div class="modal-actions"><p class="note">Next step: upload one clean Tracker row with ACS, K, D, A, +/-, K/D, DDA, ADR, HS%, KAST, FK, FD and MK.</p><button class="btn btn-red" onclick="renderSkillUploadStep(${accountId})">Next</button></div></div></div>`}
function renderSkillUploadStep(accountId){submitAccountId=accountId;$('#skill-modal').innerHTML=`<div class="modal"><div class="modal-head"><div><div class="eyebrow">Tracker screenshot</div><div class="modal-title">Upload stats row</div></div><button class="btn" onclick="closeSkillModal()">Close</button></div><div class="modal-body"><label class="upload-box" for="match-image">${matchImageFile?`<img src="${URL.createObjectURL(matchImageFile)}" alt="Selected stats screenshot"/>`:`<div><div class="upload-title">Choose image</div><div class="upload-copy">Click to upload, or paste a copied screenshot with Ctrl+V. The image is read locally and is not uploaded to Supabase.</div></div>`}</label><input id="match-image" type="file" accept="image/*" hidden onchange="selectMatchImage(event,${accountId})"/><div id="detected-stats">${detectedStats?renderDetectedStats(detectedStats):''}</div>${detectedStats?'<p class="detect-note">Check the detected values before sending. If OCR reads something wrong, edit it here.</p>':''}<div class="modal-actions"><button class="btn" onclick="renderSkillResultStep(${accountId})">Back</button><a class="btn" href="skill-rating.html#screenshot-guide">How to screenshot</a><button class="btn btn-red" onclick="submitSkillScreenshot(${accountId})">${detectedStats?'Submit report':'Read screenshot'}</button></div><p class="note">Order read from left to right: ACS, K, D, A, +/-, K/D, DDA, ADR, HS%, KAST, FK, FD, MK.</p></div></div>`}
function setSkillResult(v){skillResult=v;document.getElementById('choice-win')?.classList.toggle('on',v==='win');document.getElementById('choice-loss')?.classList.toggle('on',v==='loss')}
function selectMatchImage(event,accountId){matchImageFile=event.target.files?.[0]||null;detectedStats=null;ocrText='';renderSkillUploadStep(accountId)}
const detectedFields=[['acs','ACS',1],['kills','K',1],['deaths','D',1],['assists','A',1],['plus_minus','+/-',1],['kd_ratio','K/D',0.01],['damage_delta','DDA',1],['adr','ADR',0.1],['hs_percent','HS%',0.1],['kast_percent','KAST',0.1],['first_kills','FK',1],['first_deaths','FD',1],['multi_kills','MK',1]];
function renderDetectedStats(s){return `<div class="detected-grid">${detectedFields.map(([key,label,step])=>`<label class="detected-stat"><span>${esc(label)}</span><input class="detected-input" id="detected-${key}" type="number" step="${step}" value="${esc(s[key])}"/></label>`).join('')}</div>`}
function readDetectedStats(){const out={};detectedFields.forEach(([key,,step])=>{const value=Number(document.getElementById(`detected-${key}`)?.value);out[key]=Number.isFinite(value)?(step===1?Math.round(value):value):0});return out}
function renderStatsPreview(s){return `<div class="detected-grid">${detectedFields.map(([key,label])=>`<div class="detected-stat"><span>${esc(label)}</span><div class="detected-input">${esc(s[key])}</div></div>`).join('')}</div>`}
function renderSkillConfirmStep(accountId,stats){pendingSubmitStats=stats;const preview=calcDelta({result:skillResult,...stats});$('#skill-modal').innerHTML=`<div class="modal"><div class="modal-head"><div><div class="eyebrow">Final check</div><div class="modal-title">Confirm stats</div></div><button class="btn" onclick="closeSkillModal()">Close</button></div><div class="modal-body">${renderStatsPreview(stats)}<div class="confirm-box"><b>${preview>=0?`Estimated +${preview} SR`:`Estimated ${preview} SR`}</b><p>Make sure every value is correct before sending. By confirming, you accept the Rules & Privacy terms for incorrect or false match data, including possible charity or team-prize penalties.</p></div><div class="modal-actions"><button class="btn" onclick="renderSkillUploadStep(${accountId})">Back to edit</button><button class="btn btn-red" onclick="submitSkillReport(${accountId})">Confirm and submit</button></div></div></div>`}
function loadTesseract(){return new Promise((resolve,reject)=>{if(window.Tesseract)return resolve(window.Tesseract);const script=document.createElement('script');script.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';script.onload=()=>resolve(window.Tesseract);script.onerror=()=>reject(new Error('OCR library failed to load'));document.head.appendChild(script)})}
function parseTrackerStats(text){const tokens=String(text||'').replace(/[Oo]/g,'0').replace(/,/g,'.').match(/[-+]?\d+(?:\.\d+)?%?/g)||[];if(tokens.length<13)throw new Error(`OCR found ${tokens.length}/13 values`);const nums=tokens.slice(0,13).map(v=>Number(v.replace('%','')));if(nums.some(v=>Number.isNaN(v)))throw new Error('OCR returned unreadable values');const [acs,k,d,a,pm,kd,dd,adr,hs,kast,fk,fd,mk]=nums;return{acs:Math.round(acs),kills:Math.round(k),deaths:Math.round(d),assists:Math.round(a),plus_minus:Math.round(pm),kd_ratio:kd,damage_delta:Math.round(dd),adr,hs_percent:hs,kast_percent:kast,first_kills:Math.round(fk),first_deaths:Math.round(fd),multi_kills:Math.round(mk)}}
async function ensureSkillRow(accountId){let row=skillRatings.find(s=>s.account_id===accountId);if(row)return row;const{data,error}=await sb.from('skill_ratings').upsert({account_id:accountId,rating:0,verification_required:true,updated_at:new Date().toISOString()}).select().single();if(error)throw error;skillRatings.push(data);return data}
async function submitSkillScreenshot(accountId){try{if(!matchImageFile){toast('Choose image first or paste it with Ctrl+V');return}if(!detectedStats){toast('Reading screenshot...');const Tesseract=await loadTesseract();const result=await Tesseract.recognize(matchImageFile,'eng');ocrText=result?.data?.text||'';detectedStats=parseTrackerStats(ocrText);renderSkillUploadStep(accountId);toast('Stats detected');return}renderSkillConfirmStep(accountId,readDetectedStats())}catch(err){console.error(err);toast(err.message||'OCR error')}}
document.addEventListener('paste',event=>{if(!submitAccountId||!$('#skill-modal').classList.contains('on'))return;const item=[...(event.clipboardData?.items||[])].find(i=>i.type.startsWith('image/'));if(!item)return;const file=item.getAsFile();if(!file)return;event.preventDefault();matchImageFile=file;detectedStats=null;ocrText='';renderSkillUploadStep(submitAccountId);toast('Screenshot pasted')});
function showSkillResultModal({delta,before,after,review}){const good=delta>=0;$('#skill-modal').classList.add('on');$('#skill-modal').innerHTML=`<div class="modal"><div class="sr-result"><div class="eyebrow">${review?'Pending review':'Skill rating updated'}</div><div class="sr-orb ${good?'good':''}"><div class="sr-delta ${good?'good':'bad'}" id="sr-delta-anim">0</div></div><div class="sr-result-title">${review?'Report sent':'Match submitted'}</div><p class="sr-result-copy">${review?'Your report is waiting for admin approval. The SR change below is the estimated result after review.':'Your SR has been updated. The animation below shows the rating change from this match.'}</p><div class="sr-flow"><div class="sr-flow-box"><span>Before</span><b>${before} SR</b></div><div class="sr-arrow">-></div><div class="sr-flow-box"><span>${review?'Estimated':'After'}</span><b>${after} SR</b></div></div><div class="modal-actions" style="justify-content:center"><button class="btn btn-red" onclick="closeSkillModal()">Done</button></div></div></div>`;animateSrDelta(delta)}
function animateSrDelta(delta){const el=document.getElementById('sr-delta-anim');if(!el)return;const start=performance.now(),duration=1150,target=Math.abs(delta),sign=delta>=0?'+':'-';function frame(now){const t=Math.min(1,(now-start)/duration);const eased=1-Math.pow(1-t,3);const value=Math.round(target*eased);el.textContent=`${sign}${value}`;if(t<1)requestAnimationFrame(frame)}requestAnimationFrame(frame)}
async function submitSkillReport(accountId,stats=pendingSubmitStats){try{if(!stats){toast('No stats to submit');return}const current=await ensureSkillRow(accountId);const before=Number(current.rating||0);const payload={account_id:accountId,result:skillResult,...stats,eco_rating:Number(stats.adr)||0,first_bloods:Number(stats.first_kills)||0,plants:0,defuses:0,ocr_text:ocrText};payload.calculated_delta=calcDelta(payload);const estimated=Math.max(0,before+payload.calculated_delta);if(current.verification_required){const{error}=await sb.from('skill_match_reports').insert(payload);if(error)throw error;pendingSubmitStats=null;matchImageFile=null;detectedStats=null;ocrText='';await load();showSkillResultModal({delta:payload.calculated_delta,before,after:estimated,review:true})}else{const next=Math.max(0,before+payload.calculated_delta);let{error}=await sb.from('skill_ratings').update({rating:next,updated_at:new Date().toISOString()}).eq('account_id',accountId);if(error)throw error;({error}=await sb.from('skill_rating_log').insert({account_id:accountId,delta:payload.calculated_delta,rating_after:next,decision:'auto_approved'}));if(error)throw error;pendingSubmitStats=null;matchImageFile=null;detectedStats=null;ocrText='';await load();showSkillResultModal({delta:payload.calculated_delta,before,after:next,review:false})}}catch(err){console.error(err);toast('Skill report error')}}
async function load(){const[{data:a},{data:p},{data:c},{data:sr},{data:rep}]=await Promise.all([sb.from('accounts').select('id,player_id,username,display_name,avatar_url,is_admin'),sb.from('premier_players').select('*').order('sort_order'),sb.from('premier_act_challenges').select('*'),sb.from('skill_ratings').select('*'),sb.from('skill_match_reports').select('*')]);accounts=a||[];players=p||[];challenges=c||[];skillRatings=sr||[];skillReports=rep||[];if(me){const fresh=accounts.find(a=>a.id===me.id);if(fresh){me={...me,...fresh};setS(me)}}render()}
renderNav();load();
</script>
<script src="shared-ui.js?v=nav-unified"></script>
<script src="site-footer.js"></script>
