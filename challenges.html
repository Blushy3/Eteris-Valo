<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Eteris - Challenges</title>
  <meta name="theme-color" content="#ff4655"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="nav-user.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-modal.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--bg2:#0c0c12;--bg3:#111118;--border:rgba(255,255,255,.07);--border-hv:rgba(255,255,255,.15);--text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;--red:#ff4655;--red-dim:rgba(255,70,85,.12);--green:#10b981;--green-dim:rgba(16,185,129,.12);--gold:#f59e0b;--cyan:#00d4ff;--font-head:'Barlow Condensed',sans-serif;--font-body:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace}
    body{min-height:100vh;background:radial-gradient(circle at 80% 0,rgba(255,70,85,.08),transparent 34%),radial-gradient(circle at 8% 38%,rgba(0,212,255,.04),transparent 28%),var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.34;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
    nav{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1280px)/2));background:rgba(6,6,8,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(22px)}
    .nav-logo{text-decoration:none}.nav-logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase}.nav-logo-text span{color:var(--red)}
    .nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}.nav-a{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-radius:6px;text-decoration:none}.nav-a:hover,.nav-a.active{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-right{display:flex;align-items:center;gap:8px}.nav-user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:100px;padding:4px 12px 4px 4px;text-decoration:none;transition:all .15s}.nav-user-pill:hover{border-color:var(--border-hv)}.nav-user-av{width:26px;height:26px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(255,70,85,.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:11px;font-weight:800;color:var(--red);overflow:hidden;flex-shrink:0;line-height:1}.nav-user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}.nav-user-name{font-family:var(--font-mono);font-size:10px;color:var(--text);letter-spacing:.5px}
    .login-btn,.btn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s;text-decoration:none}.login-btn:hover,.btn:hover{color:var(--text);border-color:var(--border-hv)}.btn-red{background:var(--red);border-color:var(--red);color:#fff}.btn-green{color:var(--green);background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25)}.admin-edit-btn{color:var(--red);background:var(--red-dim);border-color:rgba(255,70,85,.25)}.admin-edit-btn.off{color:var(--muted);background:rgba(255,255,255,.04);border-color:var(--border)}
    .page{position:relative;z-index:1;width:min(1220px,calc(100vw - 32px));margin:50px auto 80px}.head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:22px}.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px}.title{font-family:var(--font-head);font-size:52px;font-weight:800;text-transform:uppercase;line-height:1}.sub{color:var(--muted);font-size:16px;margin-top:8px;max-width:680px}
    .filters{display:flex;gap:8px;flex-wrap:wrap}.filter.on{color:#fff;border-color:rgba(255,70,85,.35);background:rgba(255,70,85,.1)}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}.sum{background:rgba(12,12,18,.72);border:1px solid var(--border);border-radius:12px;padding:15px}.sum-k{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.sum-v{font-family:var(--font-head);font-size:34px;font-weight:800;margin-top:4px}.sum.complete .sum-v{color:var(--green)}.sum.risk .sum-v{color:var(--gold)}.sum.fail .sum-v{color:var(--red)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}.card{background:rgba(12,12,18,.76);border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(18px)}.card.complete{border-color:rgba(16,185,129,.28);background:rgba(16,185,129,.045)}.card.risk{border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.045)}.card.fail{border-color:rgba(255,70,85,.28);background:rgba(255,70,85,.045)}
    .player-top{display:flex;align-items:center;gap:12px}.av{width:46px;height:46px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-hv);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--red);flex-shrink:0}.av img{width:100%;height:100%;object-fit:cover}.name{font-family:var(--font-head);font-size:28px;font-weight:800;line-height:1;color:#fff}.state{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px}.state.complete{color:var(--green)}.state.risk{color:var(--gold)}.state.fail{color:var(--red)}
    .rank-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:16px 0}.rank-box{border:1px solid var(--border);border-radius:10px;padding:10px;background:rgba(255,255,255,.035)}.rank-label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.rank-val{font-family:var(--font-head);font-size:25px;font-weight:800;margin-top:3px}.arrow{color:var(--muted2);font-family:var(--font-mono);font-size:12px}
    .bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:14px}.fill{height:100%;width:var(--p);background:linear-gradient(90deg,var(--red),var(--green));border-radius:999px}
    .note{color:var(--muted);font-size:14px;line-height:1.5;min-height:42px;white-space:pre-wrap}.admin-box{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}.admin-on .admin-box{display:block}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}.label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.input{width:100%;font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:8px;padding:9px 10px;outline:none;caret-color:var(--red)}textarea.input{min-height:60px;resize:vertical}.input:focus{border-color:rgba(255,70,85,.42)}.actions{display:flex;gap:8px;flex-wrap:wrap}.toast{position:fixed;left:50%;bottom:28px;z-index:90;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:rgba(12,12,18,.96);border:1px solid var(--border-hv);border-radius:999px;padding:11px 18px;font-size:14px;font-weight:700;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%)}@media(max-width:900px){.summary{grid-template-columns:1fr 1fr}.head{align-items:start;flex-direction:column}.nav-links{display:none}}@media(max-width:620px){.summary,.grid,.rank-row,.admin-grid{grid-template-columns:1fr}.arrow{display:none}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-text">Eteris<span>.</span></div></a>
  <div class="nav-links"><a class="nav-a" href="index.html">Dashboard</a><a class="nav-a" href="notes.html">Notes</a><a class="nav-a" href="status.html">Status</a><a class="nav-a active" href="challenges.html">Challenges</a><a class="nav-a" href="feed.html">Feed</a><a class="nav-a" href="suggestions.html">Suggestions</a></div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>
<main class="page">
  <div class="head">
    <div><div class="eyebrow">Act goals</div><h1 class="title">Challenges</h1><p class="sub">Individual rank targets for the current act. Track who completed the goal and who still needs progress.</p></div>
    <div class="filters" id="filters"></div>
  </div>
  <div class="summary" id="summary"></div>
  <div class="grid" id="grid"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getS=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setS=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
const ranks=['Unranked','Iron 1','Iron 2','Iron 3','Bronze 1','Bronze 2','Bronze 3','Silver 1','Silver 2','Silver 3','Gold 1','Gold 2','Gold 3','Platinum 1','Platinum 2','Platinum 3','Diamond 1','Diamond 2','Diamond 3','Ascendant 1','Ascendant 2','Ascendant 3','Immortal 1','Immortal 2','Immortal 3','Radiant'];
let me=getS(),accounts=[],players=[],challenges=[],filter='all',adminEdit=false;
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}
function rankIndex(rank){const i=ranks.indexOf(rank);return i<0?0:i}
function rankOptions(selected){return ranks.map(r=>`<option ${r===selected?'selected':''}>${r}</option>`).join('')}
function gap(current,target){return Math.max(0,rankIndex(target)-rankIndex(current))}
function progress(current,target){const t=rankIndex(target);if(t<=0)return 100;return Math.min(100,Math.round((rankIndex(current)/t)*100))}
function state(row){const g=gap(row.current_rank,row.target_rank);if(g===0)return 'complete';if(g<=2)return 'risk';return 'fail'}
function displayName(a,p){return a?.display_name||p?.username||a?.username||'Player'}
function avatar(a,name){return a?.avatar_url?`<img src="${esc(a.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase())}
function rows(){return players.map(p=>{const account=accounts.find(a=>a.player_id===p.id)||accounts.find(a=>a.username?.toLowerCase()===p.username?.toLowerCase());if(!account)return null;const ch=challenges.find(c=>c.account_id===account.id)||{};return{player:p,account,act_label:ch.act_label||'Current Act',target_rank:ch.target_rank||'Gold 1',current_rank:ch.current_rank||'Unranked',hours_played:Number(ch.hours_played||0),admin_note:ch.admin_note||''}}).filter(Boolean)}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" type="button" onclick="openLogin()">Login</button>';return}const name=me.display_name||me.username;const av=me.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase());const edit=me.is_admin?`<button class="login-btn admin-edit-btn ${adminEdit?'':'off'}" onclick="toggleEdit()">${adminEdit?'Editing':'Edit'}</button>`:'';area.innerHTML=`<a class="nav-user-pill" href="account.html"><div class="nav-user-av">${av}</div><span class="nav-user-name">${esc(name)}</span></a>${edit}<button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){EterisAuth.open({copy:'Enter your private access code to manage challenges.',onLogin:async user=>{me=user;setS(user);await load();toast('Logged in')}})}
function logout(){me=null;adminEdit=false;setS(null);document.body.classList.remove('admin-on');renderNav();render()}
function toggleEdit(){if(!me?.is_admin)return;adminEdit=!adminEdit;document.body.classList.toggle('admin-on',adminEdit);renderNav();render()}
function renderFilters(){const items=[['all','All'],['complete','Completed'],['risk','At risk'],['fail','Not completed']];$('#filters').innerHTML=items.map(([id,label])=>`<button class="btn filter ${filter===id?'on':''}" onclick="setFilter('${id}')">${label}</button>`).join('')}
function setFilter(v){filter=v;render()}
function renderSummary(rs){const completed=rs.filter(r=>state(r)==='complete').length;const risk=rs.filter(r=>state(r)==='risk').length;const failed=rs.filter(r=>state(r)==='fail').length;$('#summary').innerHTML=`<div class="sum complete"><div class="sum-k">Completed</div><div class="sum-v">${completed}</div></div><div class="sum risk"><div class="sum-k">At risk</div><div class="sum-v">${risk}</div></div><div class="sum fail"><div class="sum-k">Not completed</div><div class="sum-v">${failed}</div></div>`}
function renderCard(r){const name=displayName(r.account,r.player);const st=state(r);const p=progress(r.current_rank,r.target_rank);return `<article class="card ${st}"><div class="player-top"><div class="av">${avatar(r.account,name)}</div><div><div class="name">${esc(name)}</div><div class="state ${st}">${st==='complete'?'Completed':st==='risk'?'At risk':'Not completed'} - ${esc(r.act_label)}</div></div></div><div class="rank-row"><div class="rank-box"><div class="rank-label">Current</div><div class="rank-val">${esc(r.current_rank)}</div></div><div class="arrow">-></div><div class="rank-box"><div class="rank-label">Target</div><div class="rank-val">${esc(r.target_rank)}</div></div></div><div class="bar" style="--p:${p}%"><div class="fill"></div></div><div class="note">${esc(r.admin_note||'No admin note yet.')}</div><div class="admin-box"><div class="admin-grid"><div class="field"><span class="label">Act</span><input class="input" id="act-${r.account.id}" value="${esc(r.act_label)}"/></div><div class="field"><span class="label">Current rank</span><select class="input" id="current-${r.account.id}">${rankOptions(r.current_rank)}</select></div><div class="field"><span class="label">Target rank</span><select class="input" id="target-${r.account.id}">${rankOptions(r.target_rank)}</select></div></div><div class="field"><span class="label">Admin note</span><textarea class="input" id="note-${r.account.id}">${esc(r.admin_note)}</textarea></div><div class="actions"><button class="btn btn-green" onclick="saveChallenge(${r.account.id})">Save goal</button></div></div></article>`}
function render(){document.body.classList.toggle('admin-on',adminEdit&&!!me?.is_admin);renderNav();renderFilters();const rs=rows();renderSummary(rs);const shown=filter==='all'?rs:rs.filter(r=>state(r)===filter);$('#grid').innerHTML=shown.length?shown.map(renderCard).join(''):'<div class="card"><div class="note">No players in this filter.</div></div>'}
async function saveChallenge(accountId){if(!me?.is_admin||!adminEdit)return;const payload={account_id:accountId,act_label:$(`#act-${accountId}`).value.trim()||'Current Act',current_rank:$(`#current-${accountId}`).value,target_rank:$(`#target-${accountId}`).value,admin_note:$(`#note-${accountId}`).value.trim(),updated_at:new Date().toISOString()};const{error}=await sb.from('premier_act_challenges').upsert(payload);if(error){toast('Save error');return}toast('Goal saved');await load()}
async function load(){const[{data:a},{data:p},{data:c}]=await Promise.all([sb.from('accounts').select('id,player_id,username,display_name,avatar_url,is_admin'),sb.from('premier_players').select('*').order('sort_order'),sb.from('premier_act_challenges').select('*')]);accounts=a||[];players=p||[];challenges=c||[];if(me){const fresh=accounts.find(a=>a.id===me.id);if(fresh){me={...me,...fresh};setS(me)}}render()}
renderNav();load();
</script>
<script src="site-footer.js"></script>
<script src="rules-consent.js"></script>
</body>
</html>
