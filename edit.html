<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Eteris - Edit Panel</title>
  <meta name="theme-color" content="#ff4655"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="nav-user.css?v=nav-unified"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-modal.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--panel:#0c0c12;--panel2:#111118;--border:rgba(255,255,255,.07);--border-hv:rgba(255,255,255,.15);--text:#e8eaf0;--muted:#8b93a3;--muted2:#4b5563;--red:#ff4655;--green:#10b981;--gold:#f59e0b;--font-head:'Barlow Condensed',sans-serif;--font-body:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace}
    body{min-height:100vh;background:radial-gradient(circle at 80% 0,rgba(255,70,85,.08),transparent 34%),radial-gradient(circle at 8% 38%,rgba(0,212,255,.04),transparent 28%),var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.32;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:64px 64px}
    nav{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1280px)/2));background:rgba(6,6,8,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(22px)}
    .nav-logo{text-decoration:none}.nav-logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase}.nav-logo-text span{color:var(--red)}
    .nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}.nav-a{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-radius:6px;text-decoration:none}.nav-a:hover,.nav-a.active{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-right{display:flex;align-items:center;gap:8px}.login-btn,.btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:8px 12px;cursor:pointer;text-decoration:none}.login-btn:hover,.btn:hover{color:var(--text);border-color:var(--border-hv)}.primary{background:var(--red);border-color:var(--red);color:#fff}.green{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}.danger{color:var(--red);border-color:rgba(255,70,85,.3);background:rgba(255,70,85,.06)}
    .page{position:relative;z-index:1;width:min(1120px,calc(100vw - 32px));margin:44px auto 80px}.head{margin-bottom:18px;animation:fadeUp .35s ease both}.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px}.title{font-family:var(--font-head);font-size:52px;font-weight:800;text-transform:uppercase;line-height:1}.sub{color:var(--muted);font-size:16px;line-height:1.55;margin-top:7px}
    .layout{display:grid;grid-template-columns:210px 1fr;gap:16px}.side{position:sticky;top:80px;align-self:start;background:rgba(12,12,18,.76);border:1px solid var(--border);border-radius:14px;padding:10px;backdrop-filter:blur(18px);animation:panelIn .35s ease both}.side-btn{width:100%;justify-content:flex-start;border:0;background:transparent;border-radius:9px;padding:12px 12px;color:var(--muted);font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}.side-btn.on{color:#fff;background:rgba(255,255,255,.055)}.side-dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--red)}
    .section{display:none}.section.on{display:block;animation:sectionIn .28s cubic-bezier(.22,1,.36,1) both}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}.section-title{font-family:var(--font-head);font-size:36px;font-weight:800;text-transform:uppercase;line-height:1}.grid{display:grid;gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:rgba(12,12,18,.76);border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(18px);animation:cardIn .32s ease both}.card-title{font-family:var(--font-head);font-size:25px;font-weight:800;text-transform:uppercase;margin-bottom:10px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.input{width:100%;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:8px;padding:10px 11px;outline:none;font-size:15px;font-weight:600;transition:border-color .16s,background .16s}.input:focus{border-color:rgba(255,70,85,.42);background:rgba(255,255,255,.06)}textarea.input{min-height:116px;resize:vertical;line-height:1.45}.hint{color:var(--muted2);font-size:13px;line-height:1.45}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.list{display:grid;gap:9px}.item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.025)}.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--panel2);border:1px solid var(--border-hv);font-family:var(--font-head);font-weight:800;color:var(--red);flex-shrink:0}.avatar img{width:100%;height:100%;object-fit:cover}.name{font-weight:800;color:#fff;line-height:1}.meta{font:9px var(--font-mono);letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}.pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:5px 7px;color:var(--muted);font:9px var(--font-mono);letter-spacing:.8px;text-transform:uppercase}.locked{min-height:52vh;display:grid;place-items:center}.locked-card{width:min(420px,100%);text-align:center}.toast{position:fixed;right:24px;bottom:24px;z-index:90;border:1px solid rgba(255,70,85,.28);border-radius:12px;background:rgba(12,12,18,.98);padding:12px 14px;color:#fff;opacity:0;transform:translateY(10px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes panelIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}@keyframes sectionIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto;display:flex;gap:6px;overflow:auto}.side-btn{white-space:nowrap}.grid.two,.grid.three{grid-template-columns:1fr}.section-head{align-items:flex-start;flex-direction:column}.nav-links{display:none}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-text">Eteris<span>.</span></div></a>
  <div class="nav-links"><a class="nav-a" href="index.html">Dashboard</a><a class="nav-a" href="status.html">Status</a></div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>

<main class="page" id="page"></main>
<div class="toast" id="toast"></div>

<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getSession=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setSession=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
let me=getSession(),accounts=[],players=[],score={},nextMap={},mapHistory=[],statuses=[],penalties=[],announcement={},section='dashboard';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const MAPS=['abyss','ascent','bind','breeze','corrode','fracture','haven','icebox','lotus','pearl','split','sunset'];
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600)}
function avatar(account){const name=displayName(account);return account?.avatar_url?`<img src="${esc(account.avatar_url)}" alt=""/>`:esc((name||'?').slice(0,2).toUpperCase())}
function displayName(a){return a?.display_name||a?.username||'Player'}
function rowAccount(p){return accounts.find(a=>a.player_id===p.id)||accounts.find(a=>a.username?.toLowerCase()===p.username?.toLowerCase())}
function mapOptions(active){return MAPS.map(m=>`<option value="${m}" ${m===active?'selected':''}>${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('')}
function dateValue(v){if(!v)return'';const s=String(v);const m=s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:s.slice(0,10)}
function timeValue(v){return v?String(v).slice(0,5):''}
function displayDate(v){if(!v)return'';const [y,m,d]=v.split('-');return`${d}.${m}.${y}`}
function renderNav(){const area=$('#nav-user-area');if(!area)return;if(!me){area.innerHTML='<button class="login-btn" onclick="openLogin()">Login</button>';return}const name=displayName(me);const av=me.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase());area.innerHTML=`<a class="nav-user-pill" href="account.html"><div class="nav-user-av">${av}</div><span class="nav-user-name">${esc(name)}</span></a><a class="login-btn active" href="edit.html">Edit</a><button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){EterisAuth.open({copy:'Enter your admin access code.',onLogin:async user=>{me=user;setSession(user);await init()}})}
function logout(){me=null;setSession(null);renderNav();renderLocked()}
function requireAdmin(){if(me?.is_admin)return true;renderLocked();return false}
function renderLocked(){renderNav();$('#page').innerHTML=`<div class="locked"><div class="card locked-card"><div class="eyebrow">Admin</div><div class="title" style="font-size:38px">Login required</div><p class="sub">Use an admin account to open the edit panel.</p><button class="btn primary" style="margin-top:16px" onclick="openLogin()">Login</button></div></div>`}
async function loadAll(){
  const [a,p,sc,nm,mh,st,pen,ann]=await Promise.all([
    sb.from('accounts').select('*'),
    sb.from('premier_players').select('*').order('sort_order'),
    sb.from('premier_score').select('*').order('id',{ascending:false}).limit(1).maybeSingle(),
    sb.from('premier_next_map').select('*').order('id').limit(1).maybeSingle(),
    sb.from('premier_map_history').select('*').order('played_at',{ascending:false}),
    sb.from('premier_status').select('*'),
    sb.from('premier_penalties').select('*'),
    sb.from('site_announcements').select('*').eq('id',1).maybeSingle()
  ]);
  accounts=a.data||[];players=p.data||[];score=sc.data||{};nextMap=nm.data||{};mapHistory=mh.data||[];statuses=st.data||[];penalties=pen.data||[];announcement=ann.data||{id:1,message:'',is_active:false};
  if(me){const fresh=accounts.find(a=>a.id===me.id);if(fresh){me={...me,...fresh};setSession(me)}}
}
function renderShell(){
  const sections=[['dashboard','Dashboard'],['roster','Roster'],['status','Status']];
  $('#page').innerHTML=`<div class="head"><div class="eyebrow">Edit panel</div><h1 class="title">Admin</h1><p class="sub">One clean place for active site settings.</p></div><div class="layout"><aside class="side">${sections.map(([id,label])=>`<button class="side-btn ${section===id?'on':''}" onclick="setSection('${id}')"><span>${label}</span>${section===id?'<span class="side-dot"></span>':''}</button>`).join('')}</aside><section id="content"></section></div>`;
  renderSection();
}
function setSection(id){section=id;renderShell()}
function renderSection(){({dashboard:renderDashboard,roster:renderRoster,status:renderStatus}[section]||renderDashboard)()}
function renderDashboard(){
  $('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Dashboard</div><div class="section-title">Score, Premier and announcements</div></div></div><div class="grid two"><div class="card"><div class="card-title">Announcement</div><label class="field"><span class="label">Message</span><textarea class="input" id="ann-message" style="min-height:220px" placeholder="Write an announcement...">${esc(announcement.message||'')}</textarea></label><label class="field"><span class="label">Visibility</span><select class="input" id="ann-active"><option value="true" ${announcement.is_active?'selected':''}>Show on dashboard</option><option value="false" ${!announcement.is_active?'selected':''}>Hidden</option></select></label><p class="hint">Shown at the top of Dashboard with a short preview. Full message opens in a scrollable preview.</p><button class="btn primary" onclick="saveAnnouncement()">Save announcement</button></div><div class="card"><div class="card-title">Premier score</div><div class="grid two"><label class="field"><span class="label">Current score</span><input class="input" id="score-current" type="number" value="${score.current||0}"/></label><label class="field"><span class="label">Qualification</span><input class="input" id="score-target" type="number" value="${score.target||600}"/></label><label class="field"><span class="label">Max score</span><input class="input" id="score-max" type="number" value="${score.max||700}"/></label><label class="field"><span class="label">Season / act</span><input class="input" id="score-season" value="${esc(score.season||'')}"/></label></div><button class="btn primary" onclick="saveScore()">Save score</button></div><div class="card"><div class="card-title">Next Premier</div><label class="field"><span class="label">Map</span><select class="input" id="next-map">${mapOptions(nextMap.map_name||'')}</select></label><div class="grid two"><label class="field"><span class="label">Date</span><input class="input" id="next-date" type="date" value="${dateValue(nextMap.match_date)}"/></label><label class="field"><span class="label">Time</span><input class="input" id="next-time" type="time" value="${timeValue(nextMap.match_time)}"/></label></div><button class="btn primary" onclick="saveNextMap()">Save next Premier</button></div><div class="card"><div class="section-head"><div class="card-title">Map history</div><button class="btn green" onclick="addMapHistory()">Add result</button></div><div class="grid three"><label class="field"><span class="label">Map</span><select class="input" id="hist-map">${mapOptions('ascent')}</select></label><label class="field"><span class="label">Result</span><select class="input" id="hist-result"><option value="win">Win</option><option value="loss">Loss</option><option value="upcoming">Upcoming</option></select></label><label class="field"><span class="label">Opponent</span><input class="input" id="hist-opp" placeholder="Team name"/></label><label class="field"><span class="label">Our score</span><input class="input" id="hist-us" type="number"/></label><label class="field"><span class="label">Their score</span><input class="input" id="hist-them" type="number"/></label></div><div class="list">${mapHistory.map(h=>`<div class="item"><div class="pill">${esc(h.result||'result')}</div><div><div class="name">${esc(h.map_name||'Map')}</div><div class="meta">${esc(h.opponent||'No opponent')}</div></div><button class="btn danger" onclick="deleteMapHistory(${Number(h.id)})">Delete</button></div>`).join('')||'<div class="hint">No history yet.</div>'}</div></div></div></div>`;
}
async function saveAnnouncement(){const payload={id:1,message:$('#ann-message').value.trim(),is_active:$('#ann-active').value==='true',updated_at:new Date().toISOString()};const{error}=await sb.from('site_announcements').upsert(payload);if(error)return toast('Announcement save error');toast('Announcement saved');await loadAll();renderDashboard()}
async function saveScore(){const payload={id:score.id||1,current:Number($('#score-current').value)||0,target:Number($('#score-target').value)||600,max:Number($('#score-max').value)||700,season:$('#score-season').value.trim(),updated_at:new Date().toISOString()};const{error}=await sb.from('premier_score').upsert(payload);if(error)return toast('Score save error');toast('Score saved');await loadAll();renderDashboard()}
async function saveNextMap(){const payload={id:nextMap.id||1,map_name:$('#next-map').value,match_date:displayDate($('#next-date').value),match_time:$('#next-time').value,opponent:'',updated_at:new Date().toISOString()};const{error}=await sb.from('premier_next_map').upsert(payload);if(error)return toast('Next Premier save error');toast('Next Premier saved');await loadAll();renderDashboard()}
async function addMapHistory(){const payload={map_name:$('#hist-map').value,result:$('#hist-result').value,opponent:$('#hist-opp').value.trim(),played_at:new Date().toISOString()};const us=Number($('#hist-us').value),them=Number($('#hist-them').value);if(!Number.isNaN(us))payload.score_us=us;if(!Number.isNaN(them))payload.score_them=them;const{error}=await sb.from('premier_map_history').insert(payload);if(error)return toast('History save error');toast('History added');await loadAll();renderDashboard()}
async function deleteMapHistory(id){if(!confirm('Delete this map history entry?'))return;const{error}=await sb.from('premier_map_history').delete().eq('id',id);if(error)return toast('History delete error');toast('History deleted');await loadAll();renderDashboard()}
function renderRoster(){
  $('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Dashboard</div><div class="section-title">Roster cards</div></div></div><div class="list">${players.map(p=>{const a=rowAccount(p)||{};const agents=(p.agents_list||p.agents||[]).join(', ');return`<div class="card"><div class="item" style="border:0;padding:0;background:transparent"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(displayName(a)||p.username)}</div><div class="meta">${esc(p.username||'player')}</div></div><button class="btn green" onclick="savePlayer(${p.id})">Save</button></div><div class="grid three" style="margin-top:12px"><label class="field"><span class="label">Rank label</span><select class="input" id="rank-${p.id}"><option value="">No rank</option><option ${p.rank_label==='IGL'?'selected':''}>IGL</option><option ${p.rank_label==='Commander'?'selected':''}>Commander</option><option ${p.rank_label==='Captain'?'selected':''}>Captain</option><option ${p.rank_label==='Reserve'?'selected':''}>Reserve</option></select></label><label class="field"><span class="label">Class</span><select class="input" id="class-${p.id}"><option value="">No class</option>${['Duelist','Controller','Initiator','Sentinel','Flex'].map(c=>`<option ${p.agent_class===c?'selected':''}>${c}</option>`).join('')}</select></label><label class="field"><span class="label">Reserve</span><select class="input" id="reserve-${p.id}"><option value="false" ${!p.is_reserve?'selected':''}>Active</option><option value="true" ${p.is_reserve?'selected':''}>Reserve</option></select></label></div><label class="field"><span class="label">Agents</span><input class="input" id="agents-${p.id}" value="${esc(agents)}" placeholder="Jett, Omen"/></label></div>`}).join('')}</div></div>`;
}
async function savePlayer(id){const payload={rank_label:$(`#rank-${id}`).value||null,agent_class:$(`#class-${id}`).value||null,is_reserve:$(`#reserve-${id}`).value==='true',agents_list:$(`#agents-${id}`).value.split(',').map(x=>x.trim()).filter(Boolean)};const{error}=await sb.from('premier_players').update(payload).eq('id',id);if(error)return toast('Player save error');toast('Player saved');await loadAll();renderRoster()}
function statusRows(){return players.map(p=>{const account=rowAccount(p);return{player:p,account,status:statuses.find(s=>s.account_id===account?.id),penalty:penalties.find(x=>x.account_id===account?.id)}}).filter(x=>x.account)}
function renderStatus(){const rows=statusRows();$('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Premier</div><div class="section-title">Status and penalties</div></div><button class="btn danger" onclick="resetAllStatuses()">Reset all statuses</button></div><div class="grid two"><div class="card"><div class="card-title">Player statuses</div><div class="list">${rows.map(r=>`<div class="item"><span class="avatar">${avatar(r.account)}</span><div><div class="name">${esc(displayName(r.account))}</div><div class="meta">${r.status?.status?esc(r.status.status.replace('_',' ')):'No status'}</div></div>${r.status?`<button class="btn danger" onclick="resetPlayerStatus(${r.account.id})">Reset</button>`:'<span class="pill">No status</span>'}</div>`).join('')}</div></div><div class="card"><div class="card-title">Charity penalties</div><div class="grid two"><label class="field"><span class="label">Player</span><select class="input" id="penalty-player">${rows.map(r=>`<option value="${r.account.id}">${esc(displayName(r.account))}</option>`).join('')}</select></label><label class="field"><span class="label">Amount PLN</span><input class="input" id="penalty-amount" type="number" min="1" value="25"/></label></div><div class="row"><button class="btn primary" onclick="changePenalty(1)">Add</button><button class="btn" onclick="changePenalty(-1)">Subtract</button></div><div class="list" style="margin-top:12px">${rows.filter(r=>Number(r.penalty?.amount_pln||0)>0).map(r=>`<div class="item"><span class="avatar">${avatar(r.account)}</span><div><div class="name">${esc(displayName(r.account))}</div><div class="meta">Charity penalty</div></div><strong>${Number(r.penalty.amount_pln).toFixed(0)} PLN</strong></div>`).join('')||'<div class="hint">No penalties assigned.</div>'}</div></div></div></div>`}
async function resetPlayerStatus(accountId){if(!confirm('Reset this player status?'))return;const{error}=await sb.from('premier_status').delete().eq('account_id',accountId);if(error)return toast('Status reset error');toast('Status reset');await loadAll();renderStatus()}
async function resetAllStatuses(){if(!confirm('Reset all player statuses?'))return;const{error}=await sb.from('premier_status').delete().neq('account_id',0);if(error)return toast('Reset error');toast('All statuses reset');await loadAll();renderStatus()}
async function changePenalty(direction){const accountId=Number($('#penalty-player').value),amount=Math.max(1,Number($('#penalty-amount').value)||0);const current=Number(penalties.find(p=>p.account_id===accountId)?.amount_pln||0);const next=Math.max(0,current+(direction*amount));let error;if(next===0)({error}=await sb.from('premier_penalties').delete().eq('account_id',accountId));else({error}=await sb.from('premier_penalties').upsert({account_id:accountId,amount_pln:next,updated_at:new Date().toISOString()}));if(error)return toast('Penalty save error');toast('Penalty updated');await loadAll();renderStatus()}
async function init(){renderNav();if(!requireAdmin())return;await loadAll();renderNav();renderShell()}
