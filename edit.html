<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Eteris - Edit Panel</title>
  <meta name="theme-color" content="#ff4655"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="nav-user.css?v=nav-unified"/>

  <script src="skill-rating-engine.js?v=advanced-v5"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--panel:#0c0c12;--panel2:#111118;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;--red:#ff4655;--red-dim:rgba(255,70,85,.12);--green:#10b981;--gold:#f59e0b;--cyan:#00d4ff;--font-head:'Barlow Condensed',sans-serif;--font-body:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace}
    body{min-height:100vh;background:radial-gradient(circle at 82% 0,rgba(255,70,85,.09),transparent 34%),radial-gradient(circle at 8% 42%,rgba(0,212,255,.035),transparent 28%),var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.3;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:52px 52px}
    a{text-decoration:none;color:inherit}button,input,textarea,select{font:inherit}
    nav{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1280px)/2));background:rgba(6,6,8,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(22px)}
    .nav-logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.nav-logo-text span{color:var(--red)}
    .nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}.nav-a{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-radius:6px}.nav-a:hover,.nav-a.active{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-right{display:flex;align-items:center;gap:8px}.login-btn,.btn{font:10px var(--font-mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:8px 12px;cursor:pointer}.login-btn:hover,.btn:hover{color:#fff;border-color:var(--border2)}.btn.primary,.login-btn.active{color:#fff;background:var(--red);border-color:var(--red)}.btn.green{color:var(--green);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}.btn.danger{color:#ff9aa3;border-color:rgba(255,70,85,.3);background:rgba(255,70,85,.07)}
    .page{position:relative;z-index:1;width:min(1240px,calc(100vw - 32px));margin:46px auto 80px}.head{margin-bottom:20px;opacity:0;transform:translateY(14px);animation:fadeUp .42s cubic-bezier(.22,1,.36,1) forwards}.eyebrow,.label{font:10px var(--font-mono);letter-spacing:2px;text-transform:uppercase;color:var(--red)}.title{font-family:var(--font-head);font-size:56px;font-weight:800;text-transform:uppercase;line-height:1}.sub{max-width:760px;margin-top:8px;color:var(--muted);font-size:16px;line-height:1.55}
    .layout{display:grid;grid-template-columns:210px minmax(0,1fr);gap:14px;opacity:0;transform:translateY(16px);animation:fadeUp .45s .08s cubic-bezier(.22,1,.36,1) forwards}.side,.card{background:rgba(12,12,18,.76);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(18px)}.side{position:sticky;top:78px;align-self:start;padding:12px;animation:panelIn .45s .12s cubic-bezier(.22,1,.36,1) both}.side-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;border:0;border-radius:9px;padding:11px 12px;background:transparent;color:var(--muted);font-family:var(--font-head);font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;text-align:left;transition:background .16s,color .16s,transform .16s}.side-btn:hover,.side-btn.on{background:rgba(255,255,255,.05);color:#fff}.side-btn:hover{transform:translateX(2px)}.side-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 16px rgba(255,70,85,.8)}
    .section{display:none}.section.on{display:block;animation:sectionIn .28s cubic-bezier(.22,1,.36,1) both}.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:12px}.section-title{font-family:var(--font-head);font-size:36px;font-weight:800;text-transform:uppercase;line-height:1}.grid{display:grid;gap:12px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{padding:16px;animation:cardIn .36s cubic-bezier(.22,1,.36,1) both}.card:nth-child(2){animation-delay:.04s}.card:nth-child(3){animation-delay:.08s}.card-title{font-family:var(--font-head);font-size:24px;font-weight:800;text-transform:uppercase;margin-bottom:10px}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.input{width:100%;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:8px;padding:10px 11px;outline:none;font-size:15px;font-weight:600;transition:border-color .16s,background .16s}.input:focus{border-color:rgba(255,70,85,.42);background:rgba(255,255,255,.06)}textarea.input{min-height:92px;resize:vertical;line-height:1.45}.hint{color:var(--muted2);font-size:13px;line-height:1.45}.list{display:grid;gap:9px}.item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.025);animation:itemIn .28s cubic-bezier(.22,1,.36,1) both}.item:nth-child(2){animation-delay:.03s}.item:nth-child(3){animation-delay:.06s}.item:nth-child(4){animation-delay:.09s}.item:nth-child(5){animation-delay:.12s}.item.stack{display:block}.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--panel2);border:1px solid var(--border2);font-family:var(--font-head);font-weight:800;color:var(--red);flex-shrink:0}.avatar img{width:100%;height:100%;object-fit:cover}.name{font-weight:800;color:#fff;line-height:1}.meta{font:9px var(--font-mono);letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}.pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;padding:5px 7px;color:var(--muted);font:9px var(--font-mono);letter-spacing:.8px;text-transform:uppercase}.pill.green{color:var(--green);border-color:rgba(16,185,129,.28);background:rgba(16,185,129,.08)}.pill.gold{color:var(--gold);border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.08)}.pill.red{color:var(--red);border-color:rgba(255,70,85,.3);background:rgba(255,70,85,.08)}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.stat{border:1px solid var(--border);border-radius:9px;background:rgba(255,255,255,.03);padding:8px}.stat b{display:block;font-family:var(--font-head);font-size:22px;color:#fff}.sr-overview{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;margin-bottom:14px}.sr-overview .card{background:linear-gradient(135deg,rgba(255,70,85,.08),rgba(255,255,255,.025))}.sr-layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.8fr);gap:14px}.sr-player-card{position:relative;overflow:hidden;border-color:rgba(255,255,255,.09);background:radial-gradient(circle at 100% 0,rgba(255,70,85,.08),transparent 34%),rgba(12,12,18,.72)}.sr-player-card::before{content:'';position:absolute;inset:0 0 auto;height:2px;background:linear-gradient(90deg,var(--red),var(--green));opacity:.65}.sr-player-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;margin-bottom:12px}.sr-rank{font-family:var(--font-head);font-size:30px;font-weight:800;color:#fff;line-height:1}.sr-form{display:grid;grid-template-columns:1fr auto;align-items:end;gap:10px}.sr-side-card{position:sticky;top:78px;align-self:start}.sr-report{border-left:2px solid rgba(245,158,11,.55)}.analysis-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0}.analysis-card{border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);padding:10px}.analysis-card b{display:block;font-family:var(--font-head);font-size:20px;color:#fff;text-transform:uppercase}.analysis-card p{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.35}.coach-list{display:grid;gap:7px;margin-top:8px}.coach-note{border:1px solid var(--border);border-radius:9px;padding:8px;background:rgba(255,255,255,.025)}.coach-note.good{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.055)}.coach-note.warning{border-color:rgba(245,158,11,.24);background:rgba(245,158,11,.055)}.coach-note.danger{border-color:rgba(255,70,85,.26);background:rgba(255,70,85,.06)}.coach-note b{display:block;color:#fff;font-size:13px}.coach-note span{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.35}.explain-layer{position:fixed;inset:0;z-index:120;display:grid;place-items:center;padding:18px;background:rgba(0,0,0,.68);backdrop-filter:blur(10px)}.explain-modal{width:min(720px,100%);max-height:calc(100vh - 36px);overflow:auto;border:1px solid rgba(255,70,85,.28);border-radius:16px;background:rgba(12,12,18,.98);box-shadow:0 30px 90px rgba(0,0,0,.7);animation:sectionIn .22s cubic-bezier(.22,1,.36,1) both}.explain-head{display:flex;justify-content:space-between;gap:12px;padding:18px;border-bottom:1px solid var(--border)}.explain-title{font-family:var(--font-head);font-size:36px;font-weight:800;text-transform:uppercase;color:#fff}.explain-body{padding:18px}.explain-line{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}.explain-line strong{font-family:var(--font-head);font-size:22px}.explain-line.pos strong{color:var(--green)}.explain-line.neg strong{color:var(--red)}.toast{position:fixed;right:24px;bottom:24px;z-index:90;border:1px solid rgba(255,70,85,.28);border-radius:12px;background:rgba(12,12,18,.98);padding:12px 14px;color:#fff;opacity:0;transform:translateY(10px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}
    .locked{display:flex;align-items:center;justify-content:center;min-height:52vh;text-align:center}.locked-card{width:min(430px,100%);background:rgba(12,12,18,.78);border:1px solid var(--border);border-radius:14px;padding:28px}.danger-zone{border-color:rgba(255,70,85,.24);background:rgba(255,70,85,.045)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes panelIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}@keyframes sectionIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.995)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes itemIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@media(prefers-reduced-motion:reduce){.head,.layout,.side,.section.on,.card,.item{animation:none!important;opacity:1!important;transform:none!important}}
    @media(max-width:900px){.layout{grid-template-columns:1fr}.side{position:relative;top:auto;display:flex;gap:6px;overflow:auto}.side-btn{white-space:nowrap}.grid.two,.grid.three,.sr-overview,.sr-layout,.sr-form{grid-template-columns:1fr}.section-head{align-items:start;flex-direction:column}.sr-side-card{position:relative;top:auto}}
  </style>
</head>
<body>
<nav>
  <a href="index.html"><div class="nav-logo-text">Eteris<span>.</span></div></a>
  <div class="nav-links"><a class="nav-a" href="index.html">Dashboard</a><a class="nav-a" href="notes.html">Notes</a><a class="nav-a" href="status.html">Status</a><a class="nav-a" href="challenges.html">Challenges</a><a class="nav-a" href="suggestions.html">Suggestions</a></div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>
<main class="page" id="page"></main>
<div class="toast" id="toast">Done</div>

<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getSession=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setSession=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const MAPS=['abyss','ascent','bind','breeze','corrode','fracture','haven','icebox','lotus','pearl','split','sunset'];
const RANKS=['Unranked','Iron 1','Iron 2','Iron 3','Bronze 1','Bronze 2','Bronze 3','Silver 1','Silver 2','Silver 3','Gold 1','Gold 2','Gold 3','Platinum 1','Platinum 2','Platinum 3','Diamond 1','Diamond 2','Diamond 3','Ascendant 1','Ascendant 2','Ascendant 3','Immortal 1','Immortal 2','Immortal 3','Radiant'];
const ETERIS_PLAYER_SR=10000;
const statusLabels={proposed:'Proposed',considering:'Considering',planned:'Planned',in_progress:'In progress',completed:'Completed',rejected:'Rejected'};
let me=getSession(),accounts=[],players=[],score=null,nextMap=null,mapHistory=[],statuses=[],penalties=[],challenges=[],suggestions=[],skillRatings=[],skillReports=[],skillLogs=[],section='dashboard';

function toast(text){const t=$('#toast');t.textContent=text;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2300)}
function displayName(a){return a?.display_name||a?.username||'Player'}
function avatar(a){const n=displayName(a);return a?.avatar_url?`<img src="${esc(a.avatar_url)}" alt=""/>`:esc(n.slice(0,2).toUpperCase())}
function rowAccount(player){return accounts.find(a=>a.player_id===player.id)||accounts.find(a=>a.username?.toLowerCase()===player.username?.toLowerCase())}
function skillInfo(rating){const points=Math.max(0,Number(rating)||0);return{rank:points>=ETERIS_PLAYER_SR?'Eteris Player':'',rating:points}}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" onclick="openLogin()">Login</button>';return}const name=displayName(me);area.innerHTML=`<a class="nav-user-pill" href="account.html"><span class="nav-user-av">${avatar(me)}</span><span class="nav-user-name">${esc(name)}</span></a>${me.is_admin?'<a class="login-btn active" href="edit.html">Edit</a>':''}<button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){EterisAuth.open({copy:'Enter your admin access code to open the edit panel.',onLogin:async user=>{me=user;setSession(user);await init()}})}
function logout(){me=null;setSession(null);renderNav();renderLocked()}
function requireAdmin(){if(me?.is_admin)return true;if(me){renderLocked('Admin only','This panel is available only for admin accounts.');return false}openLogin();return false}
function renderLocked(title='Login required',copy='Log in with an admin account to edit the site.'){renderNav();$('#page').innerHTML=`<div class="locked"><div class="locked-card"><div class="eyebrow">Edit panel</div><h1 class="title" style="font-size:38px">${esc(title)}</h1><p class="sub">${esc(copy)}</p><button class="btn primary" onclick="openLogin()" style="margin-top:16px">Login</button></div></div>`}

async function loadAll(){
  const [a,p,sc,nm,mh,st,pn,ch,sg,sr,srep,slog]=await Promise.all([
    sb.from('accounts').select('*'),
    sb.from('premier_players').select('*').order('sort_order'),
    sb.from('premier_score').select('*').order('id',{ascending:false}).limit(1).maybeSingle(),
    sb.from('premier_next_map').select('*').order('id').limit(1).maybeSingle(),
    sb.from('premier_map_history').select('*').order('played_at',{ascending:false}),
    sb.from('premier_status').select('*'),
    sb.from('premier_penalties').select('*'),
    sb.from('premier_act_challenges').select('*'),
    sb.from('suggestions').select('*').order('created_at',{ascending:false}),
    sb.from('skill_ratings').select('*'),
    sb.from('skill_match_reports').select('*').order('created_at',{ascending:true}),
    sb.from('skill_rating_log').select('*').order('created_at',{ascending:false}).limit(40)
  ]);
  accounts=a.data||[];players=p.data||[];score=sc.data||{};nextMap=nm.data||{};mapHistory=mh.data||[];statuses=st.data||[];penalties=pn.data||[];challenges=ch.data||[];suggestions=sg.data||[];skillRatings=sr.data||[];skillReports=srep.data||[];skillLogs=slog.data||[];
  if(me){const fresh=accounts.find(a=>a.id===me.id);if(fresh){me={...me,...fresh};setSession(me)}}
}

function renderShell(){
  $('#page').innerHTML=`<header class="head"><div class="eyebrow">Admin</div><h1 class="title">Edit Panel</h1><p class="sub">One place for every admin setting. Public pages stay clean; edits live here.</p></header><div class="layout"><aside class="side">${[
    ['dashboard','Dashboard'],['roster','Roster'],['status','Status'],['challenges','Challenges'],['skill','Skill Rating'],['suggestions','Suggestions']
  ].map(([id,label])=>`<button class="side-btn ${section===id?'on':''}" onclick="setSection('${id}')"><span>${label}</span>${section===id?'<span class="side-dot"></span>':''}</button>`).join('')}</aside><section id="content"></section></div>`;
  renderSection();
}
function setSection(id){section=id;renderShell()}
function renderSection(){({dashboard:renderDashboard,roster:renderRoster,status:renderStatus,challenges:renderChallenges,skill:renderSkillRating,suggestions:renderSuggestions}[section]||renderDashboard)()}
function mapOptions(selected){return MAPS.map(m=>`<option value="${m}" ${m===selected?'selected':''}>${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('')}
function rankOptions(selected){return RANKS.map(r=>`<option ${r===selected?'selected':''}>${r}</option>`).join('')}

function renderDashboard(){
  $('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Dashboard</div><div class="section-title">Score, next match and map history</div></div></div><div class="grid two"><div class="card"><div class="card-title">Premier score</div><div class="grid two"><label class="field"><span class="label">Current score</span><input class="input" id="score-current" type="number" value="${score.current||0}"/></label><label class="field"><span class="label">Qualification</span><input class="input" id="score-target" type="number" value="${score.target||600}"/></label><label class="field"><span class="label">Max score</span><input class="input" id="score-max" type="number" value="${score.max||700}"/></label><label class="field"><span class="label">Season / act</span><input class="input" id="score-season" value="${esc(score.season||'')}"/></label></div><button class="btn primary" onclick="saveScore()">Save score</button></div><div class="card"><div class="card-title">Next Premier</div><label class="field"><span class="label">Map</span><select class="input" id="next-map">${mapOptions(nextMap.map_name||'')}</select></label><div class="grid two"><label class="field"><span class="label">Date</span><input class="input" id="next-date" type="date" value="${dateValue(nextMap.match_date)}"/></label><label class="field"><span class="label">Time</span><input class="input" id="next-time" type="time" value="${timeValue(nextMap.match_time)}"/></label></div><p class="hint">Status deadline is the calendar day before Premier at 23:59.</p><button class="btn primary" onclick="saveNextMap()">Save next Premier</button></div></div><div class="card" style="margin-top:12px"><div class="section-head"><div class="card-title">Map history</div><button class="btn green" onclick="addMapHistory()">Add result</button></div><div class="grid three"><label class="field"><span class="label">Map</span><select class="input" id="hist-map">${mapOptions('ascent')}</select></label><label class="field"><span class="label">Result</span><select class="input" id="hist-result"><option value="win">Win</option><option value="loss">Loss</option><option value="upcoming">Upcoming</option></select></label><label class="field"><span class="label">Opponent</span><input class="input" id="hist-opp" placeholder="Team name"/></label><label class="field"><span class="label">Our score</span><input class="input" id="hist-us" type="number"/></label><label class="field"><span class="label">Their score</span><input class="input" id="hist-them" type="number"/></label></div><div class="list">${mapHistory.map(h=>`<div class="item"><div class="pill">${esc(h.result||'result')}</div><div><div class="name">${esc(h.map_name||'Map')}</div><div class="meta">${esc(h.opponent||'No opponent')}</div></div><button class="btn danger" onclick="deleteMapHistory(${Number(h.id)})">Delete</button></div>`).join('')||'<div class="hint">No history yet.</div>'}</div></div></div>`;
}
function dateValue(v){if(!v)return'';const m=String(v).match(/^(\d{2})\.(\d{2})\.(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:String(v).slice(0,10)}
function timeValue(v){return v?String(v).slice(0,5):''}
function displayDate(v){if(!v)return'';const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?`${m[3]}.${m[2]}.${m[1]}`:v}
async function saveScore(){const payload={id:score.id||1,current:Number($('#score-current').value)||0,target:Number($('#score-target').value)||600,max:Number($('#score-max').value)||700,season:$('#score-season').value.trim(),updated_at:new Date().toISOString()};const{error}=await sb.from('premier_score').upsert(payload);if(error)return toast('Score save error');toast('Score saved');await loadAll();renderDashboard()}
async function saveNextMap(){const payload={id:nextMap.id||1,map_name:$('#next-map').value,match_date:displayDate($('#next-date').value),match_time:$('#next-time').value,opponent:'',updated_at:new Date().toISOString()};const{error}=await sb.from('premier_next_map').upsert(payload);if(error)return toast('Next Premier save error');toast('Next Premier saved');await loadAll();renderDashboard()}

function reportInput(r){return{result:r.result,acs:r.acs,kills:r.kills,deaths:r.deaths,assists:r.assists,plus_minus:r.plus_minus,kd_ratio:r.kd_ratio,damage_delta:r.damage_delta,adr:r.adr ?? r.eco_rating,hs_percent:r.hs_percent,kast_percent:r.kast_percent,first_kills:r.first_kills ?? r.first_bloods,first_deaths:r.first_deaths,multi_kills:r.multi_kills}}
function formatDelta(v){const n=Math.round(Number(v)||0);return `${n>=0?'+':''}${n} SR`}
function issuePills(issues){return issues.map(i=>`<span class="pill ${i.severity==='high'?'red':i.severity==='medium'?'gold':''}">${esc(i.title)}</span>`).join('')}
function coachHtml(notes){return `<div class="coach-list">${notes.map(n=>`<div class="coach-note ${esc(n.level)}"><b>${esc(n.title)}</b><span>${esc(n.body)}</span></div>`).join('')}</div>`}
function logMeta(l){const snap=EterisSkillRating.logAnalysis(l);return snap?`${esc(l.decision)} - ${esc(snap.match_quality?.grade||snap.role_profile?.role||'Analyzed')} - ${new Date(l.created_at).toLocaleString('en-GB')}`:`${esc(l.decision)} - ${new Date(l.created_at).toLocaleString('en-GB')}`}
function recText(rec){const s=rec.signals||{};return `${rec.reason} Signals: avg ${s.average_delta??0} SR, ${s.trend||'no trend'}, volatility ${s.volatility??0}/100, baseline ${s.baseline||'not ready'}.`}
function playerAnalysis(accountId,sr){const reports=skillReports.filter(x=>x.account_id===accountId);const logs=skillLogs.filter(x=>x.account_id===accountId);const analyses=reports.map(r=>EterisSkillRating.analyzeReport(reportInput(r),sr));const logSnapshots=logs.map(l=>EterisSkillRating.logAnalysis(l)).filter(Boolean);const latest=analyses.at(-1);const latestSnapshot=latest?.analysisSnapshot||logSnapshots[0];const role=latest?.roleProfile||latestSnapshot?.role_profile||{role:'No data',description:'No analyzed matches yet.'};const notes=latest?.coachNotes||latestSnapshot?.coach_notes||[{title:'No analyzed matches yet',body:'Submit match reports before the engine can build a player profile.',level:'info'}];const anomalies=analyses.reduce((a,x)=>a+x.anomalies.length,0)+logSnapshots.reduce((a,x)=>a+(x.anomalies?.length||0),0);const trend=EterisSkillRating.trendForPlayer({logs,reports,current:sr});const drift=EterisSkillRating.roleDriftForPlayer({logs,reports,current:sr});const volatility=EterisSkillRating.volatilityForPlayer({logs,reports,current:sr});const baseline=EterisSkillRating.personalBaseline({logs,reports,current:sr});return{reports,logs,analyses,logSnapshots,latest,role,notes,anomalies,trend,drift,volatility,baseline}}
function openSrExplain(id){closeSrExplain();const report=skillReports.find(r=>Number(r.id)===Number(id));if(!report)return;const sr=skillRatings.find(x=>x.account_id===report.account_id)||{};const a=accounts.find(x=>x.id===report.account_id)||{};const analysis=EterisSkillRating.analyzeReport(reportInput(report),sr);const ex=analysis.explain;const rows=ex.lines.map(line=>`<div class="explain-line ${line.value>=0?'pos':'neg'}"><span>${esc(line.label)}</span><strong>${line.value>=0?'+':''}${line.value}</strong></div>`).join('');const issues=analysis.anomalies.length?`<div class="analysis-card" style="margin-top:12px"><b>Anomaly check</b><div class="row" style="margin-top:8px">${issuePills(analysis.anomalies)}</div><p>${esc(analysis.anomalies.map(x=>x.message).join(' '))}</p></div>`:'';const html=`<div class="explain-layer" id="sr-explain-layer" onclick="if(event.target.id==='sr-explain-layer')closeSrExplain()"><div class="explain-modal"><div class="explain-head"><div><div class="eyebrow">Skill rating</div><div class="explain-title">Why this SR?</div><p class="hint">${esc(displayName(a))} - ${esc(report.result)} - ${esc(ex.version)}</p></div><button class="btn" onclick="closeSrExplain()">Close</button></div><div class="explain-body"><div class="analysis-grid"><div class="analysis-card"><b>${esc(analysis.roleProfile.role)}</b><p>${esc(analysis.roleProfile.description)}</p></div><div class="analysis-card"><b>${formatDelta(ex.final)}</b><p>Raw ${formatDelta(ex.raw_delta)}. Final ${formatDelta(ex.final)} after admin multipliers and flat correction.</p></div></div>${rows}<div class="explain-line ${ex.final>=0?'pos':'neg'}"><span>Final</span><strong>${formatDelta(ex.final)}</strong></div>${issues}<div style="margin-top:12px"><div class="meta">Smart coach notes</div>${coachHtml(analysis.coachNotes)}</div></div></div></div>`;document.body.insertAdjacentHTML('beforeend',html)}
function closeSrExplain(){document.getElementById('sr-explain-layer')?.remove()}

function renderSkillRating(){
  const highest=Math.max(0,...skillRatings.map(x=>Number(x.rating)||0));
  const reviewRequired=skillRatings.filter(x=>x.verification_required).length;
  const playerRows=players.map(p=>{const a=rowAccount(p);if(!a)return'';const sr=skillRatings.find(x=>x.account_id===a.id)||{rating:0,verification_required:true,sr_gain_multiplier:1,sr_loss_multiplier:1,sr_flat_bonus:0,sr_adjustment_reason:''};const sk=skillInfo(sr.rating);const logsForPlayer=skillLogs.filter(x=>x.account_id===a.id);const analysis=playerAnalysis(a.id,sr);const rec=EterisSkillRating.recommendationForPlayer({reports:analysis.reports,logs:logsForPlayer,rating:sr.rating,current:sr});const pending=analysis.reports.length;return`<div class="card sr-player-card"><div class="sr-player-head"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(displayName(a))}</div><div class="meta">${pending?`${pending} pending report${pending>1?'s':''}`:'No pending reports'}</div></div><span class="pill ${sr.verification_required?'gold':'green'}">${sr.verification_required?'Review':'Auto'}</span></div><div class="sr-rank">${sk.rank?esc(sk.rank):`${Number(sk.rating)||0} SR`}</div><div class="meta">${sk.rank?`${Number(sk.rating)||0} SR`:'Chasing Eteris Player'}</div><div class="analysis-grid"><div class="analysis-card"><div class="meta">Role profile</div><b>${esc(analysis.role.role)}</b><p>${esc(analysis.role.description)}</p></div><div class="analysis-card"><div class="meta">Data quality</div><b>${analysis.anomalies?analysis.anomalies:'Clean'}</b><p>${analysis.anomalies?'Anomalies found across pending reports. Open reports before approval.':'No pending anomaly signal.'}</p></div></div>${coachHtml(analysis.notes)}<div class="sr-form" style="margin-top:12px"><label class="field"><span class="label">Manual SR</span><input class="input" id="manual-sr-${a.id}" type="number" min="0" value="${Number(sr.rating)||0}"/></label><button class="btn green" onclick="saveSkillSettings(${a.id})">Save SR</button></div><div class="grid three" style="margin-top:10px"><label class="field"><span class="label">Gain multiplier</span><input class="input" id="gain-mult-${a.id}" type="number" step="0.05" min="0" value="${Number(sr.sr_gain_multiplier??1)}"/></label><label class="field"><span class="label">Loss multiplier</span><input class="input" id="loss-mult-${a.id}" type="number" step="0.05" min="0" value="${Number(sr.sr_loss_multiplier??1)}"/></label><label class="field"><span class="label">Flat correction</span><input class="input" id="flat-bonus-${a.id}" type="number" step="1" value="${Number(sr.sr_flat_bonus??0)}"/></label></div><label class="field"><span class="label">Adjustment reason</span><input class="input" id="adjust-reason-${a.id}" value="${esc(sr.sr_adjustment_reason||'')}" placeholder="Why this player has a custom SR modifier"/></label><div class="item stack" style="margin:10px 0"><div class="meta">Penalty / boost recommendation - ${esc(rec.confidence)} confidence</div><p class="hint">${esc(rec.reason)}</p><div class="row" style="margin-top:8px"><span class="pill">Gain ${rec.gain_multiplier}</span><span class="pill">Loss ${rec.loss_multiplier}</span><span class="pill">Flat ${rec.flat_correction}</span><span class="pill">Avg ${rec.signals?.average_delta??0}</span>${rec.changed?`<button class="btn green" onclick="applySkillRecommendation(${a.id})">Apply recommendation</button>`:''}</div></div><div class="row"><button class="btn green" onclick="saveSkillSettings(${a.id})">Save settings</button><button class="btn" onclick="toggleSkillVerification(${a.id},${sr.verification_required?'false':'true'})">${sr.verification_required?'Set auto approve':'Require review'}</button></div></div>`}).join('');
  const reportRows=skillReports.map(r=>{const a=accounts.find(x=>x.id===r.account_id)||{};const sr=skillRatings.find(x=>x.account_id===r.account_id)||{};const sk=skillInfo(sr.rating);const input=reportInput(r);const analysis=EterisSkillRating.analyzeReport(input,sr);const stats=EterisSkillRating.STAT_FIELDS.map(([key,label])=>[label,analysis.stats[key]]);const raw=r.raw_delta??analysis.calculation.raw_delta,final=r.adjusted_delta??analysis.calculation.adjusted_delta;return`<div class="card sr-report"><div class="item" style="border:0;padding:0;background:transparent"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(displayName(a))}</div><div class="meta">${esc(r.result)} - current ${esc(sk.rank||'Chasing Eteris Player')} - submitted ${new Date(r.created_at).toLocaleString('en-GB')}</div></div><span class="pill ${final>=0?'green':'gold'}">${formatDelta(final)}</span></div><div class="row"><span class="pill">Raw ${formatDelta(raw)}</span><span class="pill">Final ${formatDelta(final)}</span><span class="pill">${esc(r.algorithm_version||analysis.explain.version)}</span><span class="pill">${esc(analysis.roleProfile.role)}</span>${issuePills(analysis.anomalies)}</div><div class="analysis-grid"><div class="analysis-card"><b>${esc(analysis.roleProfile.role)}</b><p>${esc(analysis.roleProfile.description)}</p></div><div class="analysis-card"><b>${analysis.anomalies.length?'Review data':'Data OK'}</b><p>${analysis.anomalies.length?esc(analysis.anomalies[0].message):'No critical stat anomaly detected.'}</p></div></div>${coachHtml(analysis.coachNotes)}<div class="stat-grid">${stats.map(([k,v])=>`<div class="stat"><span class="meta">${esc(k)}</span><b>${esc(v)}</b></div>`).join('')}</div><div class="row" style="margin-top:12px"><button class="btn" onclick="openSrExplain(${Number(r.id)})">Why this SR?</button><button class="btn green" onclick="approveSkillReport(${Number(r.id)})">Approve</button><button class="btn danger" onclick="rejectSkillReport(${Number(r.id)})">Reject</button></div></div>`}).join('')||'<div class="card"><div class="hint">No pending match reports.</div></div>';
  const logs=skillLogs.map(l=>{const a=accounts.find(x=>x.id===l.account_id)||{};return`<div class="item"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(displayName(a))}</div><div class="meta">${logMeta(l)}</div></div><strong>${l.delta>0?'+':''}${Number(l.delta)} SR</strong></div>`}).join('')||'<div class="hint">No rating log yet.</div>';
  $('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Skill rating</div><div class="section-title">Player rating control</div></div></div><div class="sr-overview"><div class="card"><div class="meta">Tracked players</div><div class="section-title">${players.length}</div></div><div class="card"><div class="meta">Pending reports</div><div class="section-title">${skillReports.length}</div></div><div class="card"><div class="meta">Highest SR</div><div class="section-title">${highest}</div></div></div><div class="card" style="margin-bottom:14px"><div class="card-title">Algorithm ${EterisSkillRating.VERSION}</div><p class="hint">SR is calculated by a separate engine file. It validates Tracker stats, scores damage, survival, entry impact, team impact, aim and consistency, then applies the match-result direction rule. Win reports can only finish at 0 or positive SR. Loss reports can only finish at 0 or negative SR.</p><p class="hint" style="margin-top:8px">The recommendation engine checks recent pending reports and recent SR logs. It can suggest gain/loss multipliers, but admin approval is still required by pressing Apply recommendation.</p></div><div class="grid two" style="margin-bottom:14px"><div class="card"><div class="card-title">Adjustment fields</div><div class="list"><div class="item stack"><div class="meta">Gain multiplier</div><p class="hint">Multiplies only positive SR changes. Example: raw +80 with gain multiplier 1.25 becomes +100. Use 1 for normal behavior.</p></div><div class="item stack"><div class="meta">Loss multiplier</div><p class="hint">Multiplies only negative SR changes. Example: raw -80 with loss multiplier 1.25 becomes -100. Use 1 for normal behavior.</p></div><div class="item stack"><div class="meta">Flat correction</div><p class="hint">Adds a fixed number after the multiplier. Example: final +70 with flat correction -10 becomes +60. It can be positive or negative.</p></div><div class="item stack"><div class="meta">Adjustment reason</div><p class="hint">Admin note explaining why the player has custom SR scaling. This is saved with logs so the decision is traceable.</p></div></div></div><div class="card"><div class="card-title">Examples</div><p class="hint">If a player should lose more SR for a period, set Loss multiplier above 1 and describe the reason.</p><p class="hint" style="margin-top:8px">If a player should gain less SR, set Gain multiplier below 1. If they should gain more, set it above 1.</p><p class="hint" style="margin-top:8px">Flat correction is best for small fixed changes, not long-term balancing. For long-term balancing, use multipliers.</p><p class="hint" style="margin-top:8px">Even with adjustments, win reports stay 0 or positive and loss reports stay 0 or negative before rating is applied.</p></div></div><div class="sr-layout"><div><div class="card-title">Players</div><div class="list">${playerRows}</div></div><div class="sr-side-card"><div class="card-title">Recent log</div><div class="card"><div class="list">${logs}</div></div><div class="card" style="margin-top:12px"><div class="meta">Review required</div><div class="section-title">${reviewRequired}</div><p class="hint">Use manual SR for corrections. Pending reports stay here until approved or rejected.</p></div></div></div><div style="margin-top:16px"><div class="card-title">Pending reports</div><div class="list">${reportRows}</div></div></div>`;
}
function renderSkillRating(){
  const highest=Math.max(0,...skillRatings.map(x=>Number(x.rating)||0));
  const reviewRequired=skillRatings.filter(x=>x.verification_required).length;
  const playerRows=players.map(p=>{
    const a=rowAccount(p); if(!a)return '';

    const sk=skillInfo(sr.rating);
    const analysis=playerAnalysis(a.id,sr);
    const rec=EterisSkillRating.recommendationForPlayer({reports:analysis.reports,logs:analysis.logs,rating:sr.rating,current:sr});
    const pending=analysis.reports.length;
    return `<div class="card sr-player-card">
      <div class="sr-player-head">
        <span class="avatar">${avatar(a)}</span>
        <div><div class="name">${esc(displayName(a))}</div><div class="meta">${pending?`${pending} pending report${pending>1?'s':''}`:'No pending reports'}</div></div>
        <span class="pill ${sr.verification_required?'gold':'green'}">${sr.verification_required?'Review':'Auto'}</span>
      </div>
      <div class="sr-rank">${sk.rank?esc(sk.rank):`${Number(sk.rating)||0} SR`}</div>
      <div class="meta">${sk.rank?`${Number(sk.rating)||0} SR`:'Chasing Eteris Player'}</div>
      <div class="analysis-grid">
        <div class="analysis-card"><div class="meta">Role profile</div><b>${esc(analysis.role.role)}</b><p>${esc(analysis.role.description)}</p></div>
        <div class="analysis-card"><div class="meta">Trend</div><b>${esc(analysis.trend.label)}</b><p>${esc(analysis.trend.description)}</p></div>
        <div class="analysis-card"><div class="meta">Role drift</div><b>${esc(analysis.drift.label)}</b><p>${esc(analysis.drift.description)}</p></div>
        <div class="analysis-card"><div class="meta">Volatility</div><b>${analysis.volatility.score}/100</b><p>${esc(analysis.volatility.description)}</p></div>
        <div class="analysis-card"><div class="meta">Personal baseline</div><b>${esc(analysis.baseline.label)}</b><p>${esc(analysis.baseline.description)}</p></div>
        <div class="analysis-card"><div class="meta">Data quality</div><b>${analysis.anomalies?analysis.anomalies:'Clean'}</b><p>${analysis.anomalies?'Anomalies found across reports. Open reports before approval.':'No anomaly signal.'}</p></div>
      </div>
      ${coachHtml(analysis.notes)}
      <div class="sr-form" style="margin-top:12px">
        <label class="field"><span class="label">Manual SR</span><input class="input" id="manual-sr-${a.id}" type="number" min="0" value="${Number(sr.rating)||0}"/></label>
        <button class="btn green" onclick="saveSkillSettings(${a.id})">Save SR</button>
      </div>
      <div class="grid three" style="margin-top:10px">
        <label class="field"><span class="label">Gain multiplier</span><input class="input" id="gain-mult-${a.id}" type="number" step="0.05" min="0" value="${Number(sr.sr_gain_multiplier??1)}"/></label>
        <label class="field"><span class="label">Loss multiplier</span><input class="input" id="loss-mult-${a.id}" type="number" step="0.05" min="0" value="${Number(sr.sr_loss_multiplier??1)}"/></label>
        <label class="field"><span class="label">Flat correction</span><input class="input" id="flat-bonus-${a.id}" type="number" step="1" value="${Number(sr.sr_flat_bonus??0)}"/></label>
      </div>
      <label class="field"><span class="label">Adjustment reason</span><input class="input" id="adjust-reason-${a.id}" value="${esc(sr.sr_adjustment_reason||'')}" placeholder="Why this player has a custom SR modifier"/></label>
      <div class="item stack" style="margin:10px 0">
        <div class="meta">Penalty / boost recommendation - ${esc(rec.confidence)} confidence</div>
        <p class="hint">${esc(recText(rec))}</p>
        <div class="row" style="margin-top:8px">
          <span class="pill">Gain ${rec.gain_multiplier}</span><span class="pill">Loss ${rec.loss_multiplier}</span><span class="pill">Flat ${rec.flat_correction}</span>
          <span class="pill">Avg ${rec.signals?.average_delta??0}</span><span class="pill">Vol ${rec.signals?.volatility??0}</span>
          ${rec.changed?`<button class="btn green" onclick="applySkillRecommendation(${a.id})">Apply recommendation</button>`:''}
        </div>
      </div>
      <div class="row"><button class="btn green" onclick="saveSkillSettings(${a.id})">Save settings</button><button class="btn" onclick="toggleSkillVerification(${a.id},${sr.verification_required?'false':'true'})">${sr.verification_required?'Set auto approve':'Require review'}</button></div>
    </div>`;
  }).join('');

  const reportRows=skillReports.map(r=>{
    const a=accounts.find(x=>x.id===r.account_id)||{};
    const sr=skillRatings.find(x=>x.account_id===r.account_id)||{};
    const sk=skillInfo(sr.rating);
    const input=reportInput(r);
    const analysis=EterisSkillRating.analyzeReport(input,sr);
    const stats=EterisSkillRating.STAT_FIELDS.map(([key,label])=>[label,analysis.stats[key]]);
    const raw=r.raw_delta??analysis.calculation.raw_delta,final=r.adjusted_delta??analysis.calculation.adjusted_delta;
    return `<div class="card sr-report">
      <div class="item" style="border:0;padding:0;background:transparent">
        <span class="avatar">${avatar(a)}</span>
        <div><div class="name">${esc(displayName(a))}</div><div class="meta">${esc(r.result)} - current ${esc(sk.rank||'Chasing Eteris Player')} - submitted ${new Date(r.created_at).toLocaleString('en-GB')}</div></div>
        <span class="pill ${final>=0?'green':'gold'}">${formatDelta(final)}</span>
      </div>
      <div class="row"><span class="pill">Raw ${formatDelta(raw)}</span><span class="pill">Final ${formatDelta(final)}</span><span class="pill">${esc(analysis.matchQuality.grade)}</span><span class="pill">${esc(analysis.roleProfile.role)}</span>${issuePills(analysis.anomalies)}</div>
      <div class="analysis-grid">
        <div class="analysis-card"><b>${esc(analysis.matchQuality.grade)}</b><p>${esc(analysis.matchQuality.description)}</p></div>
        <div class="analysis-card"><b>${esc(analysis.roleProfile.role)}</b><p>${esc(analysis.roleProfile.description)}</p></div>
      </div>
      <p class="hint" style="margin:10px 0">${esc(analysis.verdict)}</p>
      ${coachHtml(analysis.coachNotes)}
      <div class="stat-grid">${stats.map(([k,v])=>`<div class="stat"><span class="meta">${esc(k)}</span><b>${esc(v)}</b></div>`).join('')}</div>
      <div class="row" style="margin-top:12px"><button class="btn" onclick="openSrExplain(${Number(r.id)})">Why this SR?</button><button class="btn green" onclick="approveSkillReport(${Number(r.id)})">Approve</button><button class="btn danger" onclick="rejectSkillReport(${Number(r.id)})">Reject</button></div>
    </div>`;
  }).join('')||'<div class="card"><div class="hint">No pending match reports.</div></div>';

  const logs=skillLogs.map(l=>{
    const a=accounts.find(x=>x.id===l.account_id)||{};
    return `<div class="item"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(displayName(a))}</div><div class="meta">${logMeta(l)}</div></div><strong>${l.delta>0?'+':''}${Number(l.delta)} SR</strong></div>`;
  }).join('')||'<div class="hint">No rating log yet.</div>';

  $('#content').innerHTML=`<div class="section on">
    <div class="section-head"><div><div class="eyebrow">Skill rating</div><div class="section-title">Player rating control</div></div></div>
    <div class="sr-overview"><div class="card"><div class="meta">Tracked players</div><div class="section-title">${players.length}</div></div><div class="card"><div class="meta">Pending reports</div><div class="section-title">${skillReports.length}</div></div><div class="card"><div class="meta">Highest SR</div><div class="section-title">${highest}</div></div></div>
    <div class="card" style="margin-bottom:14px"><div class="card-title">Algorithm ${EterisSkillRating.VERSION}</div><p class="hint">SR now stores only compact snapshots: corrected stats, match quality, role profile, coach notes, anomalies and the SR breakdown. Screenshots stay local in the browser and are not uploaded to Supabase.</p></div>
    <div class="grid two" style="margin-bottom:14px"><div class="card"><div class="card-title">Adjustment fields</div><div class="list"><div class="item stack"><div class="meta">Gain multiplier</div><p class="hint">Multiplies only positive SR changes. Example: raw +80 with gain multiplier 1.25 becomes +100.</p></div><div class="item stack"><div class="meta">Loss multiplier</div><p class="hint">Multiplies only negative SR changes. Example: raw -80 with loss multiplier 1.25 becomes -100.</p></div><div class="item stack"><div class="meta">Flat correction</div><p class="hint">Adds a fixed number after the multiplier. Best for small manual corrections, not long-term balancing.</p></div><div class="item stack"><div class="meta">Adjustment reason</div><p class="hint">Admin explanation saved with future logs so custom scaling is traceable.</p></div></div></div><div class="card"><div class="card-title">Advanced signals</div><p class="hint">Trend, role drift, volatility and personal baseline use recent snapshots. If old logs have no snapshot, the system still uses their SR delta, but role/coach analysis starts from new reports.</p></div></div>
    <div class="sr-layout"><div><div class="card-title">Players</div><div class="list">${playerRows}</div></div><div class="sr-side-card"><div class="card-title">Recent log</div><div class="card"><div class="list">${logs}</div></div><div class="card" style="margin-top:12px"><div class="meta">Review required</div><div class="section-title">${reviewRequired}</div><p class="hint">Pending reports stay here until approved or rejected. After decision, only snapshots stay in the log.</p></div></div></div>
    <div style="margin-top:16px"><div class="card-title">Pending reports</div><div class="list">${reportRows}</div></div>
  </div>`;
}

async function ensureSkillRow(accountId){let row=skillRatings.find(s=>s.account_id===accountId);if(row)return row;const{data,error}=await sb.from('skill_ratings').upsert({account_id:accountId,rating:0,verification_required:true,updated_at:new Date().toISOString()}).select().single();if(error)throw error;skillRatings.push(data);return data}
async function saveSkillSettings(accountId){try{await ensureSkillRow(accountId);const rating=Math.max(0,Math.round(Number($(`#manual-sr-${accountId}`).value)||0));const gain=Math.max(0,Number($(`#gain-mult-${accountId}`).value)||1);const loss=Math.max(0,Number($(`#loss-mult-${accountId}`).value)||1);const flat=Math.round(Number($(`#flat-bonus-${accountId}`).value)||0);const reason=$(`#adjust-reason-${accountId}`).value.trim();const{error}=await sb.from('skill_ratings').update({rating,sr_gain_multiplier:gain,sr_loss_multiplier:loss,sr_flat_bonus:flat,sr_adjustment_reason:reason||null,updated_at:new Date().toISOString()}).eq('account_id',accountId);if(error)throw error;toast('Skill rating saved');await loadAll();renderSkillRating()}catch(err){console.error(err);toast('Skill rating save error')}}
async function applySkillRecommendation(accountId){const sr=skillRatings.find(x=>x.account_id===accountId)||{};const rec=EterisSkillRating.recommendationForPlayer({reports:skillReports.filter(x=>x.account_id===accountId),logs:skillLogs.filter(x=>x.account_id===accountId),rating:sr.rating,current:sr});if(!rec.changed){toast('No adjustment suggested');return}if(!confirm('Apply this algorithm recommendation?'))return;try{await ensureSkillRow(accountId);const{error}=await sb.from('skill_ratings').update({sr_gain_multiplier:rec.gain_multiplier,sr_loss_multiplier:rec.loss_multiplier,sr_flat_bonus:rec.flat_correction,sr_adjustment_reason:rec.reason,updated_at:new Date().toISOString()}).eq('account_id',accountId);if(error)throw error;toast('Recommendation applied');await loadAll();renderSkillRating()}catch(err){console.error(err);toast('Recommendation error')}}
async function toggleSkillVerification(accountId,required){try{await ensureSkillRow(accountId);const{error}=await sb.from('skill_ratings').update({verification_required:required,updated_at:new Date().toISOString()}).eq('account_id',accountId);if(error)throw error;toast('Verification updated');await loadAll();renderSkillRating()}catch(err){console.error(err);toast('Verification save error')}}
async function approveSkillReport(id){const report=skillReports.find(r=>Number(r.id)===Number(id));if(!report||!confirm('Approve this skill report?'))return;try{const sr=await ensureSkillRow(report.account_id);const analysis=EterisSkillRating.analyzeReport(reportInput(report),sr);const delta=Number(report.adjusted_delta??report.calculated_delta??analysis.calculation.delta??0);const raw=Number(report.raw_delta??analysis.calculation.raw_delta??delta);const next=Math.max(0,Number(sr.rating||0)+delta);let{error}=await sb.from('skill_ratings').update({rating:next,updated_at:new Date().toISOString()}).eq('account_id',report.account_id);if(error)throw error;({error}=await sb.from('skill_rating_log').insert({account_id:report.account_id,delta,raw_delta:raw,adjusted_delta:delta,adjustment_reason:sr.sr_adjustment_reason||null,algorithm_version:report.algorithm_version||EterisSkillRating.VERSION,rating_after:next,decision:'approved',source_report_id:id,reviewed_by:me.id,stats_snapshot:analysis.statsSnapshot,analysis_snapshot:analysis.analysisSnapshot}));if(error)throw error;({error}=await sb.from('skill_match_reports').delete().eq('id',id));if(error)throw error;toast('Report approved');await loadAll();renderSkillRating()}catch(err){console.error(err);toast('Approve error')}}
async function rejectSkillReport(id){const report=skillReports.find(r=>Number(r.id)===Number(id));if(!report||!confirm('Reject this skill report? Full submitted stats will be removed, but a small analysis snapshot will stay in the log.'))return;try{const sr=await ensureSkillRow(report.account_id);const analysis=EterisSkillRating.analyzeReport(reportInput(report),sr);let{error}=await sb.from('skill_rating_log').insert({account_id:report.account_id,delta:0,raw_delta:analysis.calculation.raw_delta,adjusted_delta:0,algorithm_version:report.algorithm_version||EterisSkillRating.VERSION,rating_after:Number(sr.rating||0),decision:'rejected',source_report_id:id,reviewed_by:me.id,stats_snapshot:analysis.statsSnapshot,analysis_snapshot:analysis.analysisSnapshot});if(error)throw error;({error}=await sb.from('skill_match_reports').delete().eq('id',id));if(error)throw error;toast('Report rejected');await loadAll();renderSkillRating()}catch(err){console.error(err);toast('Reject error')}}

function renderSuggestions(){
  $('#content').innerHTML=`<div class="section on"><div class="section-head"><div><div class="eyebrow">Suggestions</div><div class="section-title">Moderation</div></div></div><div class="list">${suggestions.filter(s=>s.status!=='withdrawn').map(s=>{const a=accounts.find(x=>x.id===s.account_id)||{};return`<div class="card"><div class="item" style="border:0;padding:0;background:transparent"><span class="avatar">${avatar(a)}</span><div><div class="name">${esc(s.title)}</div><div class="meta">${esc(displayName(a))}</div></div><button class="btn danger" onclick="deleteSuggestion(${Number(s.id)})">Delete</button></div><p class="hint" style="margin:10px 0">${esc(s.description||'')}</p><div class="grid two"><label class="field"><span class="label">Status</span><select class="input" id="s-status-${s.id}">${Object.entries(statusLabels).map(([v,l])=>`<option value="${v}" ${s.status===v?'selected':''}>${l}</option>`).join('')}</select></label><label class="field"><span class="label">Team response</span><textarea class="input" id="s-note-${s.id}">${esc(s.admin_note||'')}</textarea></label></div><button class="btn green" onclick="saveSuggestion(${Number(s.id)})">Save decision</button></div>`}).join('')||'<div class="hint">No suggestions.</div>'}</div></div>`;
}
async function saveSuggestion(id){const status=$(`#s-status-${id}`).value,now=new Date().toISOString();const payload={status,admin_note:$(`#s-note-${id}`).value.trim(),updated_at:now,completed_at:status==='completed'?now:null};const{error}=await sb.from('suggestions').update(payload).eq('id',id);if(error)return toast('Suggestion save error');toast('Suggestion saved');await loadAll();renderSuggestions()}
async function deleteSuggestion(id){if(!confirm('Delete this suggestion permanently?'))return;const{error}=await sb.from('suggestions').delete().eq('id',id);if(error)return toast('Suggestion delete error');toast('Suggestion deleted');await loadAll();renderSuggestions()}

async function init(){renderNav();if(!requireAdmin())return;await loadAll();renderNav();renderShell()}
init();
</script>

<script src="site-footer.js"></script>
<script src="rules-consent.js"></script>
