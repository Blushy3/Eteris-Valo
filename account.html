<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Eteris · Account</title>
  <meta name="theme-color" content="#ff4655"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-modal.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--bg2:#0c0c12;--bg3:#111118;--border:rgba(255,255,255,.07);--border-hv:rgba(255,255,255,.15);--text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;--red:#ff4655;--red-dim:rgba(255,70,85,.12);--green:#10b981;--font-head:'Barlow Condensed',sans-serif;--font-body:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace}
    body{min-height:100vh;background:radial-gradient(circle at 70% 0,rgba(255,70,85,.09),transparent 34%),var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.35;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
    nav{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1280px)/2));background:rgba(6,6,8,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(22px)}
    .nav-logo{text-decoration:none}.nav-logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase}.nav-logo-text span{color:var(--red)}
    .nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}.nav-a{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-radius:6px;text-decoration:none}.nav-a:hover{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-right{display:flex;align-items:center;gap:8px}.login-btn,.btn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:7px 13px;cursor:pointer;text-decoration:none}.login-btn:hover,.btn:hover{color:var(--text);border-color:var(--border-hv)}.btn-red{background:var(--red);border-color:var(--red);color:#fff}.btn-green{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:var(--green)}
    .page{position:relative;z-index:1;width:min(960px,calc(100vw - 32px));margin:48px auto 80px}.head{margin-bottom:22px}.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px}.title{font-family:var(--font-head);font-size:46px;font-weight:800;text-transform:uppercase;line-height:1}.sub{color:var(--muted);font-size:16px;margin-top:8px}
    .grid{display:grid;grid-template-columns:330px 1fr;gap:16px}.card{background:rgba(12,12,18,.78);border:1px solid var(--border);border-radius:14px;padding:22px;backdrop-filter:blur(18px)}.preview{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}.avatar{width:118px;height:118px;border-radius:50%;background:var(--bg3);border:1px solid rgba(255,70,85,.35);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--font-head);font-size:38px;font-weight:800;color:var(--red)}.avatar img{width:100%;height:100%;object-fit:cover}.name{font-family:var(--font-head);font-size:32px;font-weight:800}.user{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
    .section-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin:4px 0 14px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.input{width:100%;font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:8px;padding:10px 12px;outline:none;caret-color:var(--red)}.input:focus{border-color:rgba(255,70,85,.42)}.row{display:grid;grid-template-columns:1fr auto;gap:8px}.file{display:none}.hint{font-size:13px;line-height:1.5;color:var(--muted);margin-top:-2px}.avatar-actions{display:flex;flex-direction:column;gap:8px;width:100%}.danger{border-color:rgba(255,70,85,.28);background:rgba(255,70,85,.055)}.danger p{color:var(--muted);line-height:1.7;font-size:14px;margin-bottom:14px}.overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.72);backdrop-filter:blur(14px)}.overlay.open{display:flex}.modal{width:min(460px,100%);background:rgba(12,12,18,.98);border:1px solid rgba(255,70,85,.2);border-radius:16px;padding:24px;box-shadow:0 22px 70px rgba(0,0,0,.7)}.modal-step{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:10px}.modal-title{font-family:var(--font-head);font-size:36px;font-weight:800;text-transform:uppercase;line-height:1.05}.modal-copy{color:var(--muted);font-size:16px;line-height:1.6;margin:10px 0 18px}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:rgba(12,12,18,.96);border:1px solid var(--border-hv);border-radius:999px;padding:11px 18px;font-size:14px;font-weight:700;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%)}.locked{min-height:55vh;display:flex;align-items:center;justify-content:center;text-align:center}.locked .card{width:min(420px,100%)}
    @media(max-width:820px){.grid{grid-template-columns:1fr}.nav-links{display:none}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-text">Eteris<span>.</span></div></a>
  <div class="nav-links"><a class="nav-a" href="index.html">Dashboard</a><a class="nav-a" href="notes.html">Notes</a><a class="nav-a" href="status.html">Status</a><a class="nav-a" href="challenges.html">Challenges</a><a class="nav-a" href="feed.html">Feed</a></div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>
<main class="page" id="page"></main>
<input class="file" id="avatar-file" type="file" accept="image/*" onchange="uploadAvatar(this)"/>
<div class="overlay" id="login-modal">
  <div class="modal">
    <div class="modal-step">Account access</div>
    <div class="modal-title">Log in</div>
    <p class="modal-copy">Enter your private access code to open account settings.</p>
    <div class="field">
      <span class="label">Access code</span>
      <input class="input" id="login-code" autocomplete="off" placeholder="Your code"/>
    </div>
    <div class="modal-actions">
      <button class="btn" type="button" onclick="closeLogin()">Cancel</button>
      <button class="btn btn-red" type="button" onclick="login()">Log in</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getS=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setS=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
let me=getS();
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" onclick="showLogin()">Login</button>';return}area.innerHTML=`<button class="login-btn" onclick="logout()">Logout</button>`}
function logout(){me=null;setS(null);renderNav();render()}
function showLogin(){EterisAuth.open({copy:'Enter your private access code to open account settings.',onLogin:user=>{me=user;setS(user);render();toast('Logged in')}})}
function closeLogin(){$('#login-modal')?.classList.remove('open')}
async function login(){const code=$('#login-code').value.trim();if(!code){toast('Enter access code');return}const{data,error}=await sb.from('accounts').select('*').eq('access_code',code).single();if(error||!data){toast('Invalid code');return}me=data;setS(me);closeLogin();render();toast('Logged in')}
function avatarHtml(){const name=me?.display_name||me?.username||'?';return me?.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase())}
function render(){renderNav();if(!me){$('#page').innerHTML=`<div class="locked"><div class="card"><div class="section-title">Account</div><div class="title" style="font-size:34px">Login required</div><p class="sub">Use your access code to open account settings.</p><button class="btn btn-red" type="button" onclick="showLogin()" style="display:inline-flex;margin-top:16px">Log in</button></div></div>`;return}
  $('#page').innerHTML=`<div class="head"><div class="eyebrow">Settings</div><h1 class="title">Account</h1><p class="sub">Change login code, display name and avatar used across the app.</p></div><div class="grid"><aside class="card preview"><div class="avatar" id="avatar-preview">${avatarHtml()}</div><div><div class="name" id="preview-name">${esc(me.display_name||me.username)}</div></div><div class="avatar-actions"><button class="btn" type="button" onclick="openAvatarPicker()">Upload avatar</button><div class="field" style="margin:0;text-align:left"><span class="label">Avatar image URL</span><div class="row"><input class="input" id="avatar-url" value="${esc(me.avatar_url||'')}" placeholder="https://example.com/avatar.png" oninput="previewAvatarUrl(this.value)"/><button class="btn" type="button" onclick="saveAvatarUrl()">Use link</button></div><p class="hint">Paste a direct image link if you do not want to upload a file.</p></div></div></aside><section class="card"><div class="section-title">Identity</div><div class="field"><span class="label">Display name</span><input class="input" id="display-name" value="${esc(me.display_name||'')}" placeholder="${esc(me.username)}" oninput="$('#preview-name').textContent=this.value||'${esc(me.username)}'"/></div><div class="field"><span class="label">Login code</span><input class="input" id="access-code" value="${esc(me.access_code||'')}" autocomplete="off"/></div><button class="btn btn-green" onclick="saveAccount()">Save account</button><div class="card danger" style="margin-top:20px"><div class="section-title">Delete personal data</div><p>Removes all your notes, display name, avatar and profile media. Your account and login code stay active.</p><button class="btn btn-red" onclick="deletePersonalData()">Delete my data</button></div></section></div>`}
async function refreshMe(){const{data}=await sb.from('accounts').select('*').eq('id',me.id).single();if(data){me=data;setS(me);render()}}
async function saveAccount(){const display_name=$('#display-name').value.trim().slice(0,16);const access_code=$('#access-code').value.trim();if(!access_code){toast('Code cannot be empty');return}const{data,error}=await sb.from('accounts').update({display_name,access_code,updated_at:new Date().toISOString()}).eq('id',me.id).select().single();if(error){toast('Code already used or save error');return}me=data;setS(me);render();toast('Saved')}
function openAvatarPicker(){const input=$('#avatar-file');if(!input){toast('Upload input missing');return}input.click()}
function previewAvatarUrl(url){const clean=url.trim();const box=$('#avatar-preview');if(!box)return;box.innerHTML=clean?`<img src="${esc(clean)}" alt=""/>`:avatarHtml()}
function isImageUrl(url){try{const u=new URL(url);return /^https?:$/.test(u.protocol)}catch{return false}}
function accountStoragePath(url){try{const u=new URL(url);const marker='/storage/v1/object/public/eteris-accounts/';const index=u.pathname.indexOf(marker);if(index<0)return '';return decodeURIComponent(u.pathname.slice(index+marker.length))}catch{return ''}}
async function removeStoredAvatar(url){const path=accountStoragePath(url);if(!path||!path.startsWith('avatars/'))return;await sb.storage.from('eteris-accounts').remove([path])}
async function removeStoredAvatarIfUnused(url,excludeAccountId=null){if(!accountStoragePath(url))return;let query=sb.from('accounts').select('id',{count:'exact',head:true}).eq('avatar_url',url);if(excludeAccountId)query=query.neq('id',excludeAccountId);const{count}=await query;if(!count)await removeStoredAvatar(url)}
async function saveAvatarValue(url,msg='Avatar saved'){const oldAvatar=me?.avatar_url||'';const{data,error}=await sb.from('accounts').update({avatar_url:url,updated_at:new Date().toISOString()}).eq('id',me.id).select().single();if(error){toast('Save error');return false}if(oldAvatar&&oldAvatar!==url)await removeStoredAvatarIfUnused(oldAvatar,me.id);me=data;setS(me);render();toast(msg);return true}
async function saveAvatarUrl(){const url=$('#avatar-url').value.trim();if(!url){await saveAvatarValue('','Avatar cleared');return}if(!isImageUrl(url)){toast('Use a valid image URL');return}await saveAvatarValue(url,'Avatar link saved')}
async function uploadAvatar(input){const file=input.files?.[0];if(!file||!me)return;if(!file.type.startsWith('image/')){toast('Only images');input.value='';return}if(file.size>2*1024*1024){toast('Max avatar size is 2 MB');input.value='';return}toast('Uploading...');const ext=(file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';const path=`avatars/${me.id}-${Date.now()}.${ext}`;const{error}=await sb.storage.from('eteris-accounts').upload(path,file,{cacheControl:'3600',upsert:false});if(error){toast(error.message||'Upload error');input.value='';return}const{data}=sb.storage.from('eteris-accounts').getPublicUrl(path);input.value='';const saved=await saveAvatarValue(data.publicUrl,'Avatar uploaded');if(!saved)await sb.storage.from('eteris-accounts').remove([path])}
async function deletePersonalData(){if(!confirm('Delete your notes, display name, avatar and profile media?'))return;toast('Deleting...');const oldAvatar=me?.avatar_url||'';await sb.from('social_notes').delete().eq('account_id',me.id);const{data}=await sb.from('accounts').update({display_name:'',avatar_url:'',profile_banner_url:'',profile_background_url:'',updated_at:new Date().toISOString()}).eq('id',me.id).select().single();if(oldAvatar)await removeStoredAvatarIfUnused(oldAvatar,me.id);me=data||{...me,display_name:'',avatar_url:'',profile_banner_url:'',profile_background_url:''};setS(me);render();toast('Personal data deleted')}
document.addEventListener('input',e=>{if(e.target?.id!=='display-name')return;e.target.maxLength=16;e.target.value=e.target.value.slice(0,16);const p=$('#preview-name');if(p)p.textContent=e.target.value||me.username});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLogin();if(e.key==='Enter'&&$('#login-modal')?.classList.contains('open'))login()});
render();
</script>
<script src="site-footer.js"></script>
<script src="rules-consent.js"></script>
</body>
</html>
