const $=s=>document.querySelector(s);

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" type="button" onclick="openLogin()">Login</button>';return}const name=me.display_name||me.username;const av=me.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase());area.innerHTML=`<a class="nav-user-pill" href="account.html"><div class="nav-user-av">${av}</div><span class="nav-user-name">${esc(name)}</span></a><button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){$('#login-modal').classList.add('open');setTimeout(()=>$('#login-code')?.focus(),50)}
function closeLogin(){$('#login-modal').classList.remove('open')}
async function login(){const code=$('#login-code').value.trim();if(!code){toast('Enter access code');return}const{data,error}=await sb.from('accounts').select('*').eq('access_code',code).single();if(error||!data){toast('Invalid code');return}me=data;setS(me);closeLogin();await load();toast('Logged in')}
function logout(){me=null;setS(null);renderNav();renderLocked()}
function rowName(account,player){return account?.display_name||player?.username||account?.username||'Player'}
function rowAvatar(account,name){return account?.avatar_url?`<img src="${esc(account.avatar_url)}" alt=""/>`:esc((name||'?').slice(0,2).toUpperCase())}
function mergedRows(){return players.map(p=>{const account=accounts.find(a=>a.player_id===p.id)||accounts.find(a=>a.username?.toLowerCase()===p.username?.toLowerCase());const status=statuses.find(s=>s.account_id===account?.id);return{player:p,account,status}}).filter(x=>x.account)}
function playerCard(r){const name=rowName(r.account,r.player);return `<div class="player"><div class="av">${rowAvatar(r.account,name)}</div><div class="pname">${esc(name)}</div></div>`}
function renderLocked(){renderNav();$('#page').innerHTML=`<div class="locked"><div class="locked-card"><div class="eyebrow">Your status</div><h1 class="title" style="font-size:36px">Login required</h1><p class="sub">Log in here to set your Premier availability.</p><button class="btn btn-red" type="button" style="display:inline-flex;margin-top:16px" onclick="openLogin()">Login</button></div></div>`}
function render(){renderNav();if(!me){renderLocked();return}const mine=statuses.find(s=>s.account_id===me.id)?.status||'';const rows=mergedRows();const ready=rows.filter(r=>r.status?.status==='ready');const no=rows.filter(r=>r.status?.status==='not_ready');const unknown=rows.filter(r=>!r.status);$('#page').innerHTML=`<div class="head"><div class="eyebrow">Premier</div><h1 class="title">Your Status</h1><p class="sub">Set whether you are playing the next Premier match. Everyone on the team can see it.</p></div><div class="choice"><button class="choice-btn ready ${mine==='ready'?'active':''}" onclick="chooseStatus('ready')"><div class="choice-title">Ready</div><div class="choice-sub">I am playing. Put me on the Premier list.</div></button><button class="choice-btn not-ready ${mine==='not_ready'?'active':''}" onclick="chooseStatus('not_ready')"><div class="choice-title">Not playing</div><div class="choice-sub">Start the official over-engineered absence exam.</div></button></div><div class="summary"><div class="sum ready"><div class="sum-k">Ready</div><div class="sum-v">${ready.length}</div></div><div class="sum no"><div class="sum-k">Not playing</div><div class="sum-v">${no.length}</div></div><div class="sum"><div class="sum-k">No status</div><div class="sum-v">${unknown.length}</div></div></div><div class="columns"><section class="panel"><div class="panel-title ready">Ready</div>${ready.length?ready.map(playerCard).join(''):'<div class="empty">Nobody is ready yet.</div>'}</section><section class="panel"><div class="panel-title no">Not playing</div>${no.length?no.map(playerCard).join(''):'<div class="empty">Nobody has opted out.</div>'}</section><section class="panel"><div class="panel-title">No status</div>${unknown.length?unknown.map(playerCard).join(''):'<div class="empty">Everyone has set a status.</div>'}</section></div>`}
async function load(){const[{data:a},{data:p},{data:s}]=await Promise.all([sb.from('accounts').select('*'),sb.from('premier_players').select('*').order('sort_order'),sb.from('premier_status').select('*')]);accounts=a||[];players=p||[];statuses=s||[];render()}
function currentStatus(){return statuses.find(s=>s.account_id===me?.id)?.status||''}
async function clearStatus(){if(!me)return;const{error}=await sb.from('premier_status').delete().eq('account_id',me.id);if(error){toast('Save error');return}toast('Status cleared');await load()}
function chooseStatus(status){if(currentStatus()===status){clearStatus();return}if(status==='not_ready'){startQuiz();return}setStatus(status)}
async function setStatus(status){if(!me)return;const{error}=await sb.from('premier_status').upsert({account_id:me.id,status,updated_at:new Date().toISOString()});if(error){toast('Save error');return}toast(status==='ready'?'Ready saved':'Status saved');await load()}
function startQuiz(){quizStep=0;runawayStep=rand(4,quiz.length-2);do{hiddenStep=rand(2,quiz.length-3)}while(hiddenStep===runawayStep);tinyStep=rand(3,quiz.length-4);renderQuiz();$('#quiz-modal').classList.add('open')}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function resetSpecialButtons(){document.querySelectorAll('.quiz-option').forEach(b=>{b.classList.remove('runaway','hiddenish','tiny');b.style.left='';b.style.top=''})}
function renderQuiz(){resetSpecialButtons();const item=quiz[quizStep];$('#quiz-step').textContent=`Question ${quizStep+1} / ${quiz.length}`;$('#quiz-title').textContent=item[0];$('#quiz-copy').textContent=item[1];$('#quiz-hint').textContent=quizStep===runawayStep?'One answer panicked and left the layout.':quizStep===hiddenStep?'One answer is technically visible. Spiritually, not so much.':quizStep===tinyStep?'One answer has been nerfed for balance reasons.':'';$('#quiz-actions').innerHTML=item[2].map((opt,i)=>`<button class="quiz-option" type="button" data-ready="${opt[1]?'1':'0'}" onclick="answerQuiz(this)"><span class="quiz-letter">${String.fromCharCode(65+i)}</span>${esc(opt[0])}</button>`).join('');if(quizStep===hiddenStep){document.querySelectorAll('.quiz-option')[rand(0,2)]?.classList.add('hiddenish')}if(quizStep===tinyStep){document.querySelectorAll('.quiz-option')[rand(0,2)]?.classList.add('tiny')}if(quizStep===runawayStep){const btn=document.querySelectorAll('.quiz-option')[rand(0,2)];requestAnimationFrame(()=>placeRunaway(btn))}}
function placeRunaway(btn){if(!btn)return;const x=Math.max(18,Math.floor(Math.random()*(window.innerWidth-280)));const y=Math.max(76,Math.floor(Math.random()*(window.innerHeight-120)));btn.classList.add('runaway');btn.style.left=`${x}px`;btn.style.top=`${y}px`}
function answerQuiz(btn){if(btn.dataset.ready==='1'){closeQuiz();setStatus('ready');return}if(quizStep<quiz.length-1){quizStep++;renderQuiz();return}closeQuiz();setStatus('not_ready')}
function closeQuiz(){resetSpecialButtons();$('#quiz-modal').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('#login-modal').classList.contains('open'))login();if(e.key==='Escape'){closeLogin();closeQuiz()}});
renderNav();load();
</script>
</body>
</html>
