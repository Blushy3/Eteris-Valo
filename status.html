  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--bg2:#0c0c12;--bg3:#111118;--border:rgba(255,255,255,.07);--border-hv:rgba(255,255,255,.15);--text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;--red:#ff4655;--red-dim:rgba(255,70,85,.12);--green:#10b981;--green-dim:rgba(16,185,129,.12);--gold:#f59e0b;--font-head:'Barlow Condensed',sans-serif;--font-body:'Rajdhani',sans-serif;--font-mono:'JetBrains Mono',monospace}

    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.34;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
    nav{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1280px)/2));background:rgba(6,6,8,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(22px)}
    .nav-logo{text-decoration:none}.nav-logo-text{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase}.nav-logo-text span{color:var(--red)}
    .nav-links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:2px}.nav-a{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-radius:6px;text-decoration:none}.nav-a:hover,.nav-a.active{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-right{display:flex;align-items:center;gap:8px}.nav-user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:100px;padding:4px 12px 4px 4px;text-decoration:none;transition:all .15s}.nav-user-pill:hover{border-color:var(--border-hv)}.nav-user-av{width:26px;height:26px;border-radius:50%;background:var(--red-dim);border:1px solid rgba(255,70,85,.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:11px;font-weight:800;color:var(--red);overflow:hidden;flex-shrink:0;line-height:1}.nav-user-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}.nav-user-name{font-family:var(--font-mono);font-size:10px;color:var(--text);letter-spacing:.5px}
    .login-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s;text-decoration:none}.btn{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:7px 13px;cursor:pointer;text-decoration:none}.login-btn:hover,.btn:hover{color:var(--text);border-color:var(--border-hv)}.btn-red{background:var(--red);border-color:var(--red);color:#fff}.admin-edit-btn{color:var(--red);background:var(--red-dim);border-color:rgba(255,70,85,.25)}.admin-edit-btn:hover{color:#fff;background:rgba(255,70,85,.22);border-color:rgba(255,70,85,.45)}.admin-edit-btn.off{color:var(--muted);background:rgba(255,255,255,.04);border-color:var(--border)}
    .page{position:relative;z-index:1;width:min(1050px,calc(100vw - 32px));margin:50px auto 80px}.head{margin-bottom:24px}.eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px}.title{font-family:var(--font-head);font-size:52px;font-weight:800;text-transform:uppercase;line-height:1}.sub{color:var(--muted);font-size:16px;margin-top:8px}
    .choice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}.choice-btn{min-height:118px;border-radius:14px;border:1px solid var(--border);background:rgba(12,12,18,.74);color:var(--text);cursor:pointer;text-align:left;padding:22px;transition:.18s;backdrop-filter:blur(16px)}.choice-btn:hover{border-color:var(--border-hv);transform:translateY(-2px)}.choice-btn.ready.active{border-color:rgba(16,185,129,.42);background:rgba(16,185,129,.09)}.choice-btn.not-ready.active{border-color:rgba(255,70,85,.42);background:rgba(255,70,85,.09)}.choice-title{font-family:var(--font-head);font-size:32px;font-weight:800;text-transform:uppercase}.choice-sub{color:var(--muted);font-size:14px;margin-top:5px;line-height:1.6}
    .rule-note{margin:-4px 0 18px;padding:14px 16px;border:1px solid rgba(245,158,11,.24);border-radius:12px;background:rgba(245,158,11,.055);color:var(--muted);font-size:14px;line-height:1.55}.rule-note strong{font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:5px}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}.sum{background:rgba(12,12,18,.72);border:1px solid var(--border);border-radius:12px;padding:15px}.sum-k{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.sum-v{font-family:var(--font-head);font-size:34px;font-weight:800;margin-top:4px}.sum.ready .sum-v{color:var(--green)}.sum.no .sum-v{color:var(--red)}
    .columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.panel{background:rgba(12,12,18,.74);border:1px solid var(--border);border-radius:14px;padding:16px;min-height:220px}.panel-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:12px}.panel-title.ready{color:var(--green)}.panel-title.no{color:var(--red)}.player{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);margin-bottom:8px}.av{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border-hv);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--font-head);font-size:13px;font-weight:800;color:var(--red)}.av img{width:100%;height:100%;object-fit:cover}.pname{font-weight:700;font-size:16px;line-height:1;flex:1}.reset-btn{display:none}.admin-on .reset-btn{display:inline-flex}.admin-panel{display:none;margin:18px 0;padding:14px;border:1px solid rgba(255,70,85,.22);border-radius:12px;background:rgba(255,70,85,.06);align-items:center;justify-content:space-between;gap:12px}.admin-on .admin-panel{display:flex}.admin-copy{color:var(--muted);font-size:14px;line-height:1.5}.empty{color:var(--muted2);font-family:var(--font-mono);font-size:11px;padding:8px}.locked{display:flex;align-items:center;justify-content:center;min-height:50vh;text-align:center}.locked-card{width:min(430px,100%);background:rgba(12,12,18,.78);border:1px solid var(--border);border-radius:14px;padding:28px}
    .overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.72);backdrop-filter:blur(14px)}.overlay.open{display:flex}.modal{width:min(560px,100%);background:rgba(12,12,18,.98);border:1px solid rgba(255,70,85,.2);border-radius:16px;padding:24px;box-shadow:0 22px 70px rgba(0,0,0,.7)}.modal-step{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:10px}.modal-title{font-family:var(--font-head);font-size:36px;font-weight:800;text-transform:uppercase;line-height:1.05}.modal-copy{color:var(--muted);font-size:16px;line-height:1.6;margin:10px 0 18px}.quiz-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.quiz-option{position:relative;text-align:center;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:10px;border:1px solid var(--border);padding:13px 14px;cursor:pointer;background:rgba(255,255,255,.04);color:var(--text);transition:.15s}.quiz-option:hover{border-color:var(--border-hv);background:rgba(255,255,255,.07)}.quiz-option:first-child{color:var(--green);border-color:rgba(16,185,129,.24);background:rgba(16,185,129,.08)}.quiz-option:last-child{color:var(--red);border-color:rgba(255,70,85,.24);background:rgba(255,70,85,.08)}.quiz-option.hiddenish{opacity:.12}.quiz-option.tiny{transform:scale(.68);transform-origin:center}.quiz-option.runaway{position:fixed;z-index:80;width:260px;box-shadow:0 12px 30px rgba(255,70,85,.18)}.quiz-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted2);margin-top:12px}
    .field{display:flex;flex-direction:column;gap:6px;margin:16px 0 8px;text-align:left}.label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}.input{width:100%;font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:8px;padding:10px 12px;outline:none;caret-color:var(--red)}.input:focus{border-color:rgba(255,70,85,.42)}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}.toast{position:fixed;left:50%;bottom:28px;z-index:90;transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;background:rgba(12,12,18,.96);border:1px solid var(--border-hv);border-radius:999px;padding:11px 18px;font-size:14px;font-weight:700;transition:.22s}.toast.show{opacity:1;transform:translateX(-50%)}
    @media(max-width:850px){.nav-links{display:none}.choice,.summary,.columns{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-text">Eteris<span>.</span></div></a>
  <div class="nav-links"><a class="nav-a" href="index.html">Dashboard</a><a class="nav-a" href="notes.html">Notes</a><a class="nav-a active" href="status.html">Status</a></div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>
<main class="page" id="page"></main>

<div class="overlay" id="quiz-modal">
  <div class="modal">
    <div class="modal-step" id="quiz-step">Question 1 / 25</div>
    <div class="modal-title" id="quiz-title">Availability check</div>
    <p class="modal-copy" id="quiz-copy"></p>
    <div class="quiz-actions" id="quiz-actions"></div>
    <div class="quiz-hint" id="quiz-hint"></div>
  </div>
</div>

<div class="overlay" id="login-modal">
  <div class="modal">
    <div class="modal-step">Account access</div>
    <div class="modal-title">Login</div>
    <p class="modal-copy">Enter your private access code to set your Premier status.</p>
    <div class="field">
      <span class="label">Access code</span>
      <input class="input" id="login-code" autocomplete="off" placeholder="Your code"/>
    </div>
    <div class="modal-actions">
      <button class="btn" type="button" onclick="closeLogin()">Cancel</button>
      <button class="btn btn-red" type="button" onclick="login()">Login</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const sb=supabase.createClient('https://jczxgcbxqnnhlafvekul.supabase.co','sb_publishable_ZsL8foOFNJYOa3FW4YoKdw_-gJCnZ5P');
const SESSION_KEY='eteris_social_user';
const getS=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};
const setS=u=>u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY);
let me=getS(),accounts=[],players=[],statuses=[],quizStep=0,runawayStep=-1,hiddenStep=-1,tinyStep=-1,adminEdit=false;
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const confirmQuestions=[
  ['Solar mass check','The Sun weighs about 1.989 x 10^30 kg. Are you really trying to add your excuse on top of that?'],
  ['Team lobby audit','Four people are staring at the queue button like it owes them money. Are you still out?'],
  ['Duo pressure','Your duo has typed "bro" with no punctuation. That is legally a warning. Continue?'],
  ['Smoke crisis','Someone just said "I can smoke" and hovered Reyna. Do you still want to leave?'],
  ['Snack clause','Have you considered grabbing water and becoming available like a hydrated professional?'],
  ['Premier paperwork','Not ready now requires three forms, a witness, and emotional damage. Proceed?'],
  ['Aim confidence','What if today is randomly the day your aim stops being a rumor? Still no?'],
  ['Economy round','The team is low on credits and high on hope. Are you abandoning the spreadsheet?'],
  ['Discord weather report','Forecast says 90% awkward silence if you dodge. Continue anyway?'],
  ['Lineup reality','Nobody knows lineups. That means expectations are already low. Still not ready?'],
  ['Mouse statement','Your mouse asked for one more chance. It sounded sincere. Ignore it?'],
  ['Map veto court','The map pool is bad, but your absence would be worse. Continue?'],
  ['Mental math','If five players are needed and four are ready, are you sure the missing variable is not you?'],
  ['Tactical honesty','Is this a real reason, or did your brain just alt-tab from responsibility?'],
  ['Patch notes','Latest patch: clicking No too much causes side effects such as being roasted. Accept?'],
  ['Warmup lobby','The practice range misses you. Weird, but touching. Still no?'],
  ['Coach energy','An imaginary coach is writing your name on a clipboard. Do you disappoint the clipboard?'],
  ['Queue insurance','If you play, worst case it is content. If you do not, it is paperwork. Continue?'],
  ['Social contract','Your status will say Not ready where everyone can see it. Are you emotionally prepared?'],
  ['Button psychology','The No button is getting too comfortable. Do you want to reward that behavior?'],
  ['Final snack check','Could this be solved by one snack and a dramatic sigh?'],
  ['Almost final','This is the part where most people accidentally become Ready. Resist?'],
  ['Very final','Are you absolutely, scientifically, spiritually Not ready?'],
  ['Final final','Last chance to escape the Not Ready Hall of Mild Shame. Continue?'],
  ['Actual final','If you click No now, we mark you as Not ready. Final answer?']
];
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}
function renderNav(){const area=$('#nav-user-area');if(!me){area.innerHTML='<button class="login-btn" type="button" onclick="openLogin()">Login</button>';return}const name=me.display_name||me.username;const av=me.avatar_url?`<img src="${esc(me.avatar_url)}" alt=""/>`:esc(name.slice(0,2).toUpperCase());const edit=me.is_admin?`<button class="login-btn admin-edit-btn ${adminEdit?'':'off'}" type="button" onclick="toggleAdminEdit()">${adminEdit?'Editing':'Edit'}</button>`:'';area.innerHTML=`<a class="nav-user-pill" href="account.html"><div class="nav-user-av">${av}</div><span class="nav-user-name">${esc(name)}</span></a>${edit}<button class="login-btn" onclick="logout()">Logout</button>`}
function openLogin(){$('#login-modal').classList.add('open');setTimeout(()=>$('#login-code')?.focus(),50)}
function closeLogin(){$('#login-modal').classList.remove('open')}
async function login(){const code=$('#login-code').value.trim();if(!code){toast('Enter access code');return}const{data,error}=await sb.from('accounts').select('*').eq('access_code',code).single();if(error||!data){toast('Invalid code');return}me=data;setS(me);closeLogin();await load();toast('Logged in')}
function logout(){me=null;adminEdit=false;setS(null);renderNav();renderLocked()}
function toggleAdminEdit(){if(!me?.is_admin)return;adminEdit=!adminEdit;render()}
function rowName(account,player){return account?.display_name||player?.username||account?.username||'Player'}
function rowAvatar(account,name){return account?.avatar_url?`<img src="${esc(account.avatar_url)}" alt=""/>`:esc((name||'?').slice(0,2).toUpperCase())}
function mergedRows(){return players.map(p=>{const account=accounts.find(a=>a.player_id===p.id)||accounts.find(a=>a.username?.toLowerCase()===p.username?.toLowerCase());const status=statuses.find(s=>s.account_id===account?.id);return{player:p,account,status}}).filter(x=>x.account)}
function playerCard(r){const name=rowName(r.account,r.player);const reset=r.status?`<button class="btn reset-btn" type="button" onclick="resetPlayerStatus(${r.account.id})">Reset</button>`:'';return `<div class="player"><div class="av">${rowAvatar(r.account,name)}</div><div class="pname">${esc(name)}</div>${reset}</div>`}
function renderLocked(){document.body.classList.remove('admin-on');renderNav();$('#page').innerHTML=`<div class="locked"><div class="locked-card"><div class="eyebrow">Your status</div><h1 class="title" style="font-size:36px">Login required</h1><p class="sub">Log in here to set your Premier availability.</p><button class="btn btn-red" type="button" style="display:inline-flex;margin-top:16px" onclick="openLogin()">Login</button></div></div>`}
function render(){renderNav();if(!me){renderLocked();return}document.body.classList.toggle('admin-on',!!adminEdit&&!!me.is_admin);const mine=statuses.find(s=>s.account_id===me.id)?.status||'';const rows=mergedRows();const ready=rows.filter(r=>r.status?.status==='ready');const no=rows.filter(r=>r.status?.status==='not_ready');const unknown=rows.filter(r=>!r.status);$('#page').innerHTML=`<div class="head"><div class="eyebrow">Premier</div><h1 class="title">Your Status</h1><p class="sub">Set whether you are playing the next Premier match. Everyone on the team can see it.</p></div><div class="choice"><button class="choice-btn ready ${mine==='ready'?'active':''}" onclick="chooseStatus('ready')"><div class="choice-title">Ready</div><div class="choice-sub">I am playing. Put me on the Premier list.</div></button><button class="choice-btn not-ready ${mine==='not_ready'?'active':''}" onclick="chooseStatus('not_ready')"><div class="choice-title">Not ready</div><div class="choice-sub">Mark yourself as unavailable for the next Premier match.</div></button></div><div class="rule-note"><strong>Status rule</strong>If you do not set either Ready or Not ready by the day before Premier starts, you agree to donate 25 PLN or more to any charity fundraiser. By using this site and playing in our team, you accept this rule.</div>${me.is_admin?`<div class="admin-panel"><div><div class="panel-title no" style="margin:0 0 4px">Admin edit</div><div class="admin-copy">Reset player statuses back to No status. Edit mode starts off by default.</div></div><button class="btn btn-red" type="button" onclick="resetAllStatuses()">Reset all</button></div>`:''}<div class="summary"><div class="sum ready"><div class="sum-k">Ready</div><div class="sum-v">${ready.length}</div></div><div class="sum no"><div class="sum-k">Not ready</div><div class="sum-v">${no.length}</div></div><div class="sum"><div class="sum-k">No status</div><div class="sum-v">${unknown.length}</div></div></div><div class="columns"><section class="panel"><div class="panel-title ready">Ready</div>${ready.length?ready.map(playerCard).join(''):'<div class="empty">Nobody is ready yet.</div>'}</section><section class="panel"><div class="panel-title no">Not ready</div>${no.length?no.map(playerCard).join(''):'<div class="empty">Nobody is marked as not ready.</div>'}</section><section class="panel"><div class="panel-title">No status</div>${unknown.length?unknown.map(playerCard).join(''):'<div class="empty">Everyone has set a status.</div>'}</section></div>`}
async function load(){const[{data:a},{data:p},{data:s}]=await Promise.all([sb.from('accounts').select('*'),sb.from('premier_players').select('*').order('sort_order'),sb.from('premier_status').select('*')]);accounts=a||[];players=p||[];statuses=s||[];render()}
function currentStatus(){return statuses.find(s=>s.account_id===me?.id)?.status||''}
async function clearStatus(){if(!me)return;const{error}=await sb.from('premier_status').delete().eq('account_id',me.id);if(error){toast('Save error');return}toast('Status cleared');await load()}
async function resetPlayerStatus(accountId){if(!me?.is_admin||!adminEdit)return;const{error}=await sb.from('premier_status').delete().eq('account_id',accountId);if(error){toast('Reset error');return}toast('Status reset');await load()}
async function resetAllStatuses(){if(!me?.is_admin||!adminEdit)return;const{error}=await sb.from('premier_status').delete().neq('account_id',0);if(error){toast('Reset error');return}toast('All statuses reset');await load()}
function chooseStatus(status){if(currentStatus()===status){clearStatus();return}setStatus(status)}
async function setStatus(status){if(!me)return;const{error}=await sb.from('premier_status').upsert({account_id:me.id,status,updated_at:new Date().toISOString()});if(error){toast('Save error');return}toast(status==='ready'?'Ready saved':'Status saved');await load()}
function startQuiz(){quizStep=0;runawayStep=rand(4,confirmQuestions.length-2);do{hiddenStep=rand(2,confirmQuestions.length-3)}while(hiddenStep===runawayStep);tinyStep=rand(3,confirmQuestions.length-4);renderQuiz();$('#quiz-modal').classList.add('open')}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function resetSpecialButtons(){document.querySelectorAll('.quiz-option').forEach(b=>{b.classList.remove('runaway','hiddenish','tiny');b.style.left='';b.style.top=''})}
function renderQuiz(){resetSpecialButtons();const item=confirmQuestions[quizStep];$('#quiz-step').textContent=`Question ${quizStep+1} / ${confirmQuestions.length}`;$('#quiz-title').textContent=item[0];$('#quiz-copy').textContent=item[1];$('#quiz-hint').textContent=quizStep===runawayStep?'The No button panicked and left the layout.':quizStep===hiddenStep?'One button is technically visible. Spiritually, not so much.':quizStep===tinyStep?'One button has been nerfed for balance reasons.':'';$('#quiz-actions').innerHTML=`<button class="quiz-option" type="button" data-answer="yes" onclick="answerQuiz(this)">Yes, I will play</button><button class="quiz-option" type="button" data-answer="no" onclick="answerQuiz(this)">No, continue the paperwork</button>`;const buttons=document.querySelectorAll('.quiz-option');if(quizStep===hiddenStep)buttons[1]?.classList.add('hiddenish');if(quizStep===tinyStep)buttons[1]?.classList.add('tiny');if(quizStep===runawayStep)requestAnimationFrame(()=>placeRunaway(buttons[1]))}
function placeRunaway(btn){if(!btn)return;const x=Math.max(18,Math.floor(Math.random()*(window.innerWidth-280)));const y=Math.max(76,Math.floor(Math.random()*(window.innerHeight-120)));btn.classList.add('runaway');btn.style.left=`${x}px`;btn.style.top=`${y}px`}
function answerQuiz(btn){if(btn.dataset.answer==='yes'){closeQuiz();setStatus('ready');return}if(quizStep<confirmQuestions.length-1){quizStep++;renderQuiz();return}closeQuiz();setStatus('not_ready')}
function closeQuiz(){resetSpecialButtons();$('#quiz-modal').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('#login-modal').classList.contains('open'))login();if(e.key==='Escape'){closeLogin();closeQuiz()}});
renderNav();load();
</script>
</body>
</html>
